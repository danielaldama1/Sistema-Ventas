// HELPERS
// ══════════════════════════════════════════════════════
const getTodayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const getToday = () => new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const fmt = n => `$${Number(n||0).toFixed(0)}`;
const getPrecio = (datos, variante) => {
  if (datos.precios && variante && datos.precios[variante] !== undefined) return datos.precios[variante];
  return datos.precio || 0;
};
const calcSubtotal = (precioBase, cantidad, extras=[]) => {
  const tieneExtraQueso = extras.some(e => e.includes("Extra Queso"));
  return (precioBase + (tieneExtraQueso ? PRECIO_EXTRA_QUESO : 0)) * cantidad;
};

// ══════════════════════════════════════════════════════
// EXPORTAR EXCEL
// ══════════════════════════════════════════════════════
function exportarExcel(pedidos) {
  const hoy = getTodayKey();
  const pedidosHoy = pedidos.filter(p => p.fecha === hoy && p.estado !== "cancelado");

  // Hoja 1: Resumen por pedido
  const resumen = pedidosHoy.map(p => ({
    "ID": `#${String(p.ts||"").slice(-4)}`,
    "Mesa/Cliente": p.mesa || "Sin mesa",
    "Hora": p.hora || "",
    "Estado": p.estado || "",
    "Total ($)": p.total || 0,
  }));

  // Hoja 2: Detalle de productos
  const detalle = [];
  pedidosHoy.forEach(p => {
    (p.items||[]).forEach(item => {
      detalle.push({
        "ID Pedido": `#${String(p.ts||"").slice(-4)}`,
        "Mesa/Cliente": p.mesa || "Sin mesa",
        "Hora": p.hora || "",
        "Producto": item.nombre || "",
        "Cantidad": item.cantidad || 1,
        "Subtotal ($)": item.subtotal || 0,
        "Entregado": item.entregado ? "Sí" : "No",
      });
    });
  });

  // Hoja 3: Totales del día
  const totalDia = pedidosHoy.reduce((s,p)=>s+(p.total||0),0);
  const totales = [
    { "Concepto": "Total ventas del día", "Valor ($)": totalDia },
    { "Concepto": "Número de pedidos", "Valor ($)": pedidosHoy.length },
    { "Concepto": "Ticket promedio", "Valor ($)": pedidosHoy.length ? Math.round(totalDia/pedidosHoy.length) : 0 },
    { "Concepto": "Pedidos cancelados", "Valor ($)": pedidos.filter(p=>p.fecha===hoy&&p.estado==="cancelado").length },
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen),  "Pedidos del Día");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detalle),  "Detalle Productos");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(totales),  "Resumen General");
  XLSX.writeFile(wb, `BenditoAntojo_${hoy}.xlsx`);
}

function ModalProducto({ producto, nombre, onConfirmar, onCerrar }) {
  const d = producto;
  const [variante, setVariante] = useState(d.variantes?.[0] || null);
  const [relleno,  setRelleno]  = useState(d.rellenos?.[0] || null);

  const [cantidad, setCantidad] = useState(1);
  const [nota,     setNota]     = useState("");

  const toggleExtra = ex => setExtras(prev => prev.includes(ex) ? prev.filter(e=>e!==ex) : [...prev,ex]);
  const precioBase = getPrecio(d, variante);
  const subtotal   = calcSubtotal(precioBase, cantidad, extras);
  const partes     = [variante, relleno, sabor, extras.length ? extras.join(", ") : null, nota||null].filter(Boolean);
  const descripcion = `${nombre}${partes.length ? ` (${partes.join(" | ")})` : ""}`;

  return (
    <div style={M.overlay} onClick={e=>{ if(e.target===e.currentTarget) onCerrar(); }}>
      <div style={M.box}>
        <div style={M.header}>
          <span style={{fontSize:32}}>{d.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:17,color:"#F0EBE3"}}>{nombre}</div>
            <div style={{fontSize:13,color:"#E85D04",fontWeight:700}}>
              {fmt(precioBase)}{d.unidad?` ${d.unidad}`:""}
              {extras.some(e=>e.includes("Extra Queso")) && <span style={{color:"#FFBA08"}}> +$5 queso</span>}
            </div>
          </div>
          <button style={M.closeBtn} onClick={onCerrar}>✕</button>
        </div>

        <div style={M.body}>
          {d.variantes?.length > 0 && (
            <div style={M.section}>
              <div style={M.sectionTitle}>{d.categoria==="bebida"?"🥤 Presentación":"🍽️ Tipo"}</div>
              <div style={M.chipRow}>
                {d.variantes.map(v=>(
                  <button key={v} style={{...M.chip,...(variante===v?M.chipOn:{})}} onClick={()=>setVariante(v)}>
                    {v}{d.precios?.[v]?` · ${fmt(d.precios[v]))}`:""}
                  </button>
                ))}
              </div>
            </div>
          )}
          {d.rellenos && (
            <div style={M.section}>
              <div style={M.sectionTitle}>🥩 Relleno</div>
              <div style={M.chipRow}>
                {d.rellenos.map(r=>(
                  <button key={r} style={{...M.chip,...(relleno===r?M.chipOn:{})}} onClick={()=>setRelleno(r)}>{r}</button>
                ))}
              </div>
            </div>
          )}
          {d.sabores && (
            <div style={M.section}>
              <div style={M.sectionTitle}>🍓 Sabor</div>
              <div style={M.chipRow}>
                {d.sabores.map(s=>(
                  <button key={s} style={{...M.chip,...(sabor===s?M.chipOn:{})}} onClick={()=>setSabor(s)}>{s}</button>
                ))}
              </div>
            </div>
          )}
          {d.extras && (
            <div style={M.section}>
              <div style={M.sectionTitle}>➕ Extras <span style={{fontSize:11,color:"#888",fontWeight:400}}>(selección múltiple)</span></div>
              <div style={M.chipRow}>
                {d.extras.map(ex=>(
                  <button key={ex}
                    style={{...M.chip,...(extras.includes(ex)?M.chipOn:{}),...(ex.includes("Extra Queso")?{borderColor:"#FFBA08"}:{})}}
                    onClick={()=>toggleExtra(ex)}>{ex}</button>
                ))}
              </div>
            </div>
          )}
          <div style={M.section}>
            <div style={M.sectionTitle}>📝 Nota especial <span style={{fontSize:11,color:"#888",fontWeight:400}}>(opcional)</span></div>
            <input style={M.notaInput} placeholder="Ej: sin cebolla, extra picoso…" value={nota} onChange={e=>setNota(e.target.value)}/>

              <button style={M.qBtn} onClick={()=>setCantidad(c=>Math.max(1,c-1))}>−</button>

}

// APP PRINCIPAL
// ══════════════════════════════════════════════════════
function App() {
  const [sesion,  setSesion]  = useState(null); // null = no logueado
  const [view,    setView]    = useState("central");
  const [pedidos, setPedidos] = useState({});
  const [menu,    setMenu]    = useState(MENU_DEFAULT);
  const [notif,   setNotif]   = useState(null);
  const [fbReady, setFbReady] = useState(false);

  useEffect(() => {
    db.ref("pedidos").on("value", snap => setPedidos(snap.val() || {}));
    db.ref("menu").on("value", snap => {
      const val = snap.val();
      if (val) setMenu(val); else db.ref("menu").set(MENU_DEFAULT);
    });
    setFbReady(true);
  }, []);

  const showNotif = msg => { setNotif(msg); setTimeout(()=>setNotif(null), 2800); };

  const addPedido = useCallback(pedido => {
    db.ref("pedidos").push({
      ...pedido,
      fecha: getTodayKey(),
      hora: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
      estado: "pendiente",
      ts: Date.now()
    });
    showNotif("✅ Pedido enviado a cocina");
  }, []);

  // Al agregar items nuevos se marcan con esNuevo:true para destacarlos visualmente
  const agregarAlPedido = useCallback((id, pedidoActual, itemsNuevos) => {
    // Quitar esNuevo de items viejos, marcar nuevos
    const itemsViejos = (pedidoActual.items||[]).map(i=>({...i, esNuevo:false}));
    const itemsMarcados = itemsNuevos.map(i=>({...i, entregado:false, esNuevo:true}));
    const items = [...itemsViejos, ...itemsMarcados];
    const total = items.reduce((s,i)=>s+(i.subtotal||0),0);
    db.ref(`pedidos/${id}`).update({
      items, total, estado:"pendiente",
      actualizado: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
    });
    showNotif("✅ Productos añadidos — pedido vuelve a Pendientes");
  }, []);

  const marcarItemEntregado = useCallback((id, pedidoActual, itemIdx) => {
    const items = (pedidoActual.items||[]).map((it,i) => i===itemIdx ? {...it, entregado:true, esNuevo:false} : it);
    db.ref(`pedidos/${id}`).update({ items });
    showNotif("✓ Producto marcado como entregado");
  }, []);

  const updateEstado = (id, estado) => db.ref(`pedidos/${id}`).update({ estado });
  const cancelar     = id => db.ref(`pedidos/${id}`).update({ estado:"cancelado" });
  const updateMenu   = nuevoMenu => { db.ref("menu").set(nuevoMenu); showNotif("✅ Menú actualizado"); };

  const pedidosArr = Object.entries(pedidos).map(([id,p])=>({...p,id})).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const hoy = pedidosArr.filter(p=>p.fecha===getTodayKey());
  const esAdmin = sesion?.rol === "admin";

  // Sin sesión → pantalla de login del sistema
  if (!sesion) return <LoginSistema onLogin={setSesion}/>;

  const navItems = [
    {k:"central", l:"📺 Central"},
    {k:"pedido",  l:"📱 Pedido"},
    {k:"reportes",l:"📊 Reportes", soloAdmin:true},
    {k:"admin",   l:"⚙️ Admin",    soloAdmin:true},
  ];

  return (
    <div style={S.root}>
      {notif && <div style={S.toast}>{notif}</div>}
      <nav style={S.nav}>
        <div style={S.brand}>
          <span style={{fontSize:22}}>🌮</span>
          <span style={S.brandText}>Bendito Antojo</span>
          {fbReady && <span style={S.online}>● EN VIVO</span>}
        </div>
        <div style={S.navBtns}>
          {navItems.filter(v=> !v.soloAdmin || esAdmin).map(v=>(
            <button key={v.k}
              style={{...S.navBtn,...(view===v.k?S.navBtnOn:{})}}
              onClick={()=>setView(v.k)}>
              {v.l}
            </button>
          ))}
          <button style={{...S.navBtn,color:"#EF233C",borderColor:"#EF233C"}}
            onClick={()=>setSesion(null)}>
            🚪
          </button>
        </div>
      </nav>
      <main style={S.main}>
        {view==="central"  && <Central pedidos={hoy} onUpdate={updateEstado} onCancelar={cancelar} onAgregarAl={agregarAlPedido} onMarcarItem={marcarItemEntregado} menu={menu}/>}
        {view==="pedido"   && <Pedido  onAdd={addPedido} menu={menu}/>}
        {view==="reportes" && esAdmin && <Reportes pedidos={pedidosArr}/>}
        {view==="admin"    && esAdmin && <AdminView menu={menu} onUpdate={updateMenu}/>}
      </main>
    </div>
  );
}

    { k:"pendiente",  l:"⏳ Pendientes", c:"#FFBA08", acc:[{l:"▶ Preparar",e:"en_proceso",c:"#3A86FF"}] },
    { k:"en_proceso", l:"👨‍🍳 En Proceso", c:"#3A86FF", acc:[{l:"✅ Listo",   e:"listo",    c:"#06D6A0"}] },
    { k:"listo",      l:"✅ Listos",      c:"#06D6A0", acc:[{l:"🤝 Entregar",e:"entregado",c:"#888"}]    },
    { k:"entregado",  l:"🤝 Entregados",  c:"#888",    acc:[] },
  ];

  const confirmarExtra = item => { setCarritoExtra(prev=>[...prev,item]); setProductoModal(null); };
  const confirmarAgregarAl = () => {
    if (!pedidoSelec || carritoExtra.length===0) return;
    onAgregarAl(pedidoSelec.id, pedidoSelec, carritoExtra);
    setPedidoSelec(null); setCarritoExtra([]);
  };

  return (
    <div>
      <div style={S.centralDate}>📅 {getToday()}</div>

      {/* Modal: elegir producto para agregar al pedido */}
      {pedidoSelec && !productoModal && (
        <div style={M.overlay} onClick={e=>{ if(e.target===e.currentTarget){ setPedidoSelec(null); setCarritoExtra([]); }}}>
          <div style={M.box}>
            <div style={M.header}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16,color:"#E85D04"}}>➕ Agregar productos</div>
                <div style={{fontSize:13,color:"#aaa"}}>Pedido #{String(pedidoSelec.ts).slice(-4)} — {pedidoSelec.mesa||"Sin mesa"}</div>
              </div>
              <button style={M.closeBtn} onClick={()=>{ setPedidoSelec(null); setCarritoExtra([]); }}>✕</button>
            </div>
            <div style={{...M.body,maxHeight:"52vh",overflowY:"auto"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8}}>
                {Object.entries(menu).map(([nombre,datos])=>(
                  <button key={nombre}
                    style={{background:"#242424",border:`2px solid ${datos.color}`,borderRadius:10,padding:"10px 6px",color:"#fff",cursor:"pointer",textAlign:"center"}}
                    onClick={()=>setProductoModal({nombre,datos})}>
                    <div style={{fontSize:22}}>{datos.icon}</div>
                    <div style={{fontSize:12,fontWeight:700,marginTop:3}}>{nombre}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{fmt(getPrecio(datos,datos.variantes?.[0]))}</div>
                  </button>
                ))}
              </div>
              {carritoExtra.length > 0 && (
                <div style={{marginTop:12,background:"#111",padding:10,borderRadius:8}}>
                  <div style={{fontWeight:700,marginBottom:6,color:"#E85D04"}}>Por agregar:</div>
                  {carritoExtra.map((i,idx)=>(
                    <div key={idx} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"2px 0",color:"#ccc"}}>
                      <span>{i.icon} {i.nombre}</span><span>{fmt(i.subtotal)}</span>
                    </div>
                  ))}
                  <div style={{borderTop:"1px solid #333",marginTop:6,paddingTop:6,fontWeight:800,color:"#E85D04",textAlign:"right"}}>
                    Extra: {fmt(carritoExtra.reduce((s,i)=>s+i.subtotal,0))}
                  </div>
                </div>
              )}
            </div>
            <div style={M.footer}>
              <button style={{...M.confirmBtn,opacity:carritoExtra.length===0?0.4:1}}
                disabled={carritoExtra.length===0} onClick={confirmarAgregarAl}>
                ✅ Confirmar y enviar a cocina
              </button>
            </div>
          </div>
        </div>
      )}

      {productoModal && (
        <ModalProducto nombre={productoModal.nombre} producto={productoModal.datos}
          onConfirmar={confirmarExtra} onCerrar={()=>setProductoModal(null)}/>
      )}

      <div style={S.kanban}>
        {cols.map(col=>(
          <div key={col.k} style={S.kCol}>
            <div style={{...S.kHead,borderBottom:`3px solid ${col.c}`,color:col.c}}>{col.l}</div>
            {pedidos.filter(p=>p.estado===col.k).map(p=>(
              <div key={p.id} style={{...S.card,...(p.actualizado?{border:"2px solid #E85D04"}:{})}}>
                <div style={S.cardTop}>
                  <b>#{String(p.ts||"").slice(-4)}</b> — {p.mesa||"Sin mesa"}<br/>
                  <small style={{color:"#aaa"}}>{p.hora}{p.actualizado?` · act. ${p.actualizado}`:""} · {fmt(p.total)}</small>
                </div>

                {/* Items: nuevos resaltados en naranja, entregados tachados */}
                <div style={S.itemsList}>
                  {/* Separador visual si hay items nuevos */}
                  {(p.items||[]).some(i=>i.esNuevo) && (
                    <div style={{fontSize:10,color:"#E85D04",fontWeight:800,padding:"3px 0",letterSpacing:"0.5px"}}>
                      ── ORIGINALES ──────────────
                    </div>
                  )}
                  {(p.items||[]).filter(i=>!i.esNuevo).map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"2px 0",borderBottom:"1px solid #222"}}>
                      <span style={{flex:1,fontSize:12,lineHeight:1.4,
                        color:item.entregado?"#444":"#ccc",
                        textDecoration:item.entregado?"line-through":"none"}}>
                        {item.icon} {item.nombre} <span style={{color:item.entregado?"#333":"#E85D04"}}>×{item.cantidad}</span>
                      </span>
                      {col.k==="entregado" && !item.entregado && (
                        <button style={S.checkBtn} onClick={()=>onMarcarItem(p.id,p,(p.items||[]).indexOf(item))}>✓</button>
                      )}
                      {item.entregado && <span style={{fontSize:10,color:"#06D6A0"}}>✓</span>}
                    </div>
                  ))}

                  {/* Productos NUEVOS agregados después */}
                  {(p.items||[]).some(i=>i.esNuevo) && (
                    <div style={{fontSize:10,color:"#FFBA08",fontWeight:800,padding:"4px 0 2px",letterSpacing:"0.5px"}}>
                      ── NUEVOS 🆕 ───────────────
                    </div>
                  )}
                  {(p.items||[]).filter(i=>i.esNuevo).map((item,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 0",
                      borderBottom:"1px solid #2a2a2a",
                      background:"rgba(232,93,4,0.08)",borderRadius:4,paddingLeft:4,
                      animation:"pulseNew 2s ease-in-out infinite"}}>
                      <span style={{flex:1,fontSize:12,lineHeight:1.4,
                        color:item.entregado?"#444":"#F0EBE3",fontWeight:600,
                        textDecoration:item.entregado?"line-through":"none"}}>
                        {item.icon} {item.nombre} <span style={{color:"#FFBA08"}}>×{item.cantidad}</span>
                      </span>
                      {col.k==="entregado" && !item.entregado && (
                        <button style={S.checkBtn} onClick={()=>onMarcarItem(p.id,p,(p.items||[]).indexOf(item))}>✓</button>
                      )}
                      {item.entregado && <span style={{fontSize:10,color:"#06D6A0"}}>✓</span>}
                    </div>
                  ))}
                </div>

                <div style={S.cardAcc}>
                  {col.acc.map(a=>(
                    <button key={a.e} style={{...S.accBtn,background:a.c}} onClick={()=>onUpdate(p.id,a.e)}>{a.l}</button>
                  ))}
                  <button style={{...S.accBtn,background:"#9D4EDD"}}
                    onClick={()=>{ setPedidoSelec(p); setCarritoExtra([]); }}>➕</button>
                  {col.k==="pendiente" && (
                    <button style={{...S.accBtn,background:"#EF233C"}} onClick={()=>onCancelar(p.id)}>✕</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// PEDIDO
// ══════════════════════════════════════════════════════
function Pedido({ onAdd, menu }) {
  const [carrito,       setCarrito]       = useState([]);
  const [mesa,          setMesa]          = useState("");
  const [productoModal, setProductoModal] = useState(null);
  const [filtro,        setFiltro]        = useState("comida");
  const [mesaError,     setMesaError]     = useState(false);
  const total = carrito.reduce((s,i)=>s+(i.subtotal||0),0);

  const confirmar = item => { setCarrito(prev=>[...prev,item]); setProductoModal(null); };
  const enviar = () => {
    if (!mesa.trim()) { setMesaError(true); setTimeout(()=>setMesaError(false),2500); return; }
    onAdd({items:carrito,mesa,total});
    setCarrito([]); setMesa("");
  };

  return (
    <div style={{paddingBottom:130}}>
      {productoModal && (
        <ModalProducto nombre={productoModal.nombre} producto={productoModal.datos}
          onConfirmar={confirmar} onCerrar={()=>setProductoModal(null)}/>
      )}

      <input style={{...S.mesaInput,...(mesaError?{border:"2px solid #EF233C"}:{})}}
        placeholder="🪑 Mesa / Nombre del cliente (obligatorio)"
        value={mesa} onChange={e=>setMesa(e.target.value)}/>
      {mesaError && <div style={{color:"#EF233C",fontSize:13,marginTop:-10,marginBottom:10}}>⚠️ Escribe la mesa o nombre antes de enviar</div>}

      <div style={S.filtroRow}>
        <button style={{...S.filtroBtn,...(filtro==="comida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("comida")}>🍽️ Comida</button>
        <button style={{...S.filtroBtn,...(filtro==="bebida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("bebida")}>🥤 Bebidas</button>
      </div>

      <div style={S.menuGrid}>
        {Object.entries(menu).filter(([,d])=>d.categoria===filtro).map(([n,d])=>(
          <button key={n} style={{...S.mCard,borderTop:`4px solid ${d.color}`,cursor:"pointer"}}
            onClick={()=>setProductoModal({nombre:n,datos:d})}>
            <div style={{fontSize:28}}>{d.icon}</div>
            <div style={{fontWeight:700,fontSize:13,margin:"5px 0 3px"}}>{n}</div>
            <div style={{fontSize:11,color:"#aaa"}}>
              {d.precio?fmt(d.precio):d.precios?`desde ${fmt(Math.min(...Object.values(d.precios)))}`:""}{d.unidad?` ${d.unidad}`:""}
            </div>
          </button>
        ))}
      </div>

      {carrito.length > 0 && (
        <div style={S.carritoPanel}>
          <div style={{fontWeight:800,marginBottom:10,color:"#E85D04",fontSize:15}}>🛒 Carrito</div>
          {carrito.map((item,i)=>(
            <div key={i} style={S.carritoRow}>
              <span style={{flex:1,fontSize:13}}>{item.icon} {item.nombre}</span>
              <span style={{fontSize:13,marginRight:10,color:"#E85D04",fontWeight:700}}>{fmt(item.subtotal)}</span>
              <button style={S.removeBtn} onClick={()=>setCarrito(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
          <div style={{borderTop:"1px solid #333",marginTop:10,paddingTop:10,fontWeight:800,fontSize:17,textAlign:"right"}}>Total: {fmt(total)}</div>
          <button style={{...S.fab,...(!mesa.trim()?{opacity:0.5}:{})}} onClick={enviar}>
            🚀 Enviar Pedido · {fmt(total)}
          </button>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={S.rWrap}>

          onClick={()=>exportarExcel(pedidos)}>
          📥 Exportar Excel del día
        </button>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        {[
          {n:fmt(hoyP.reduce((s,p)=>s+(p.total||0),0)),    l:"Ventas hoy"},
          {n:fmt(validos.reduce((s,p)=>s+(p.total||0),0)), l:"Ventas totales"},
          {n:hoyP.length,                                   l:"Pedidos hoy"},
          {n:pedidos.filter(p=>p.estado==="cancelado"&&p.fecha===hoy).length, l:"Cancelados hoy"},
        ].map((s,i)=>(
          <div key={i} style={S.statCard}>
            <div style={S.statNum}>{s.n}</div>
            <div style={S.statLbl}>{s.l}</div>
          </div>
        ))}
      </div>
      <h4 style={{color:"#ccc",margin:"0 0 10px"}}>Últimos 30 pedidos</h4>
      {pedidos.slice(0,30).map(p=>(
        <div key={p.id} style={{...S.card,marginBottom:6,fontSize:13}}>
          <b>#{String(p.ts||"").slice(-4)}</b> — {p.mesa||"Sin mesa"} — {p.fecha} {p.hora} — {fmt(p.total)} —{" "}

        </div>
      ))}
    </div>
  );
}

// ADMIN — CRUD completo de menú
// ══════════════════════════════════════════════════════
function AdminView({ menu, onUpdate }) {
  const [tab,         setTab]         = useState("lista"); // lista | nuevo | editar
  const [editando,    setEditando]    = useState(null);    // nombre del producto editando
  const [form,        setForm]        = useState(formVacio());

  function formVacio() {
    return { nombre:"", icon:"🍽️", color:"#E85D04", categoria:"comida", precio:"", unidad:"",
             variantes:"", rellenos:"", sabores:"", extras:"" };
  }

  const abrirNuevo = () => { setForm(formVacio()); setEditando(null); setTab("nuevo"); };
  const abrirEditar = (nombre) => {
    const d = menu[nombre];
    setForm({
      nombre,
      icon: d.icon||"🍽️",
      color: d.color||"#E85D04",
      categoria: d.categoria||"comida",
      precio: d.precio||"",
      unidad: d.unidad||"",
      variantes: (d.variantes||[]).join(", "),
      rellenos: (d.rellenos||[]).join(", "),
      sabores: (d.sabores||[]).join(", "),
      extras: (d.extras||[]).join(", "),
      // precios custom se manejan aparte
      preciosRaw: JSON.stringify(d.precios||null, null, 2),
    });
    setEditando(nombre);
    setTab("nuevo");
  };

  const eliminar = (nombre) => {
    if (!confirm(`¿Eliminar "${nombre}" del menú?`)) return;
    const nuevo = {...menu};
    delete nuevo[nombre];
    onUpdate(nuevo);
  };

  const guardar = () => {
    const n = form.nombre.trim();
    if (!n) { alert("El nombre es obligatorio"); return; }
    const split = s => s.split(",").map(x=>x.trim()).filter(Boolean);

    let precios = null;
    if (form.preciosRaw) {
      try { precios = JSON.parse(form.preciosRaw); } catch { alert("Formato de precios inválido (JSON)"); return; }
    }

    const prod = {
      icon: form.icon||"🍽️",
      color: form.color||"#E85D04",
      categoria: form.categoria||"comida",
      ...(form.precio ? { precio: Number(form.precio) } : {}),
      ...(form.unidad ? { unidad: form.unidad } : {}),
      ...(split(form.variantes).length ? { variantes: split(form.variantes) } : {}),
      ...(split(form.rellenos).length  ? { rellenos:  split(form.rellenos)  } : {}),
      ...(split(form.sabores).length   ? { sabores:   split(form.sabores)   } : {}),
      ...(split(form.extras).length    ? { extras:    split(form.extras)    } : {}),
      ...(precios ? { precios } : {}),
    };

    const nuevo = {...menu};
    if (editando && editando !== n) delete nuevo[editando]; // renombrar
    nuevo[n] = prod;
    onUpdate(nuevo);
    setTab("lista");
  };

  const F = form;
  const inp = (campo, placeholder, tipo="text") => (
    <input type={tipo}
      style={SA.inp}
      placeholder={placeholder}
      value={F[campo]||""}
      onChange={e=>setForm(p=>({...p,[campo]:e.target.value}))}/>
  );

  return (
    <div style={S.rWrap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{color:"#E85D04",margin:0}}>⚙️ Gestión de Menú</h3>
        {tab==="lista" && <button style={SA.btnVerde} onClick={abrirNuevo}>+ Nuevo producto</button>}
        {tab!=="lista" && <button style={SA.btnGris}  onClick={()=>setTab("lista")}>← Volver</button>}
      </div>

      {/* LISTA */}
      {tab==="lista" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
          {Object.entries(menu).map(([n,d])=>(
            <div key={n} style={{...S.card,borderTop:`4px solid ${d.color}`,padding:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:24}}>{d.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>{n}</div>
                  <div style={{fontSize:11,color:"#aaa"}}>{d.categoria} · {d.precio?fmt(d.precio):d.precios?`desde ${fmt(Math.min(...Object.values(d.precios)))}`:""}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button style={{...SA.btnPeq,background:"#3A86FF"}} onClick={()=>abrirEditar(n)}>✏️ Editar</button>
                <button style={{...SA.btnPeq,background:"#EF233C"}} onClick={()=>eliminar(n)}>🗑️ Eliminar</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* FORMULARIO nuevo/editar */}
      {tab==="nuevo" && (
        <div style={{maxWidth:500}}>
          <h4 style={{color:"#ccc",marginTop:0}}>{editando?"Editando: "+editando:"Nuevo producto"}</h4>

          <div style={SA.grupo}><label style={SA.lbl}>Nombre *</label>{inp("nombre","Ej: Tlayuda")}</div>
          <div style={{display:"flex",gap:10}}>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Ícono</label>{inp("icon","🍽️")}</div>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Color</label><input type="color" value={F.color||"#E85D04"} onChange={e=>setForm(p=>({...p,color:e.target.value}))} style={{width:"100%",height:42,borderRadius:8,border:"none",cursor:"pointer",background:"none"}}/></div>
          </div>
          <div style={SA.grupo}>
            <label style={SA.lbl}>Categoría</label>
            <select style={SA.inp} value={F.categoria} onChange={e=>setForm(p=>({...p,categoria:e.target.value}))}>
              <option value="comida">Comida</option>
              <option value="bebida">Bebida</option>
            </select>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{...SA.grupo,flex:2}}><label style={SA.lbl}>Precio fijo ($)</label>{inp("precio","Ej: 55","number")}</div>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Unidad</label>{inp("unidad","c/u")}</div>
          </div>
          <div style={SA.grupo}><label style={SA.lbl}>Variantes <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("variantes","Ej: Verdes, Rojos")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Rellenos <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("rellenos","Ej: Pollo, Suadero")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Sabores <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("sabores","Ej: Chocolate, Fresa")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Extras <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("extras","Ej: Crema, Cebolla, Extra Queso +$5")}</div>
          <div style={SA.grupo}>
            <label style={SA.lbl}>Precios por variante <span style={{color:"#666",fontWeight:400}}>(JSON, opcional)</span></label>
            <textarea style={{...SA.inp,height:90,resize:"vertical",fontFamily:"monospace",fontSize:12}}
              placeholder={'{"Corona 1/2 L": 45, "Corona 1 L": 90}'}
              value={F.preciosRaw||""}
              onChange={e=>setForm(p=>({...p,preciosRaw:e.target.value}))}/>
          </div>
          <button style={{...SA.btnVerde,width:"100%",padding:"13px 0",fontSize:15,marginTop:4}} onClick={guardar}>
            💾 {editando?"Guardar cambios":"Crear producto"}
          </button>
        </div>
      )}
    </div>
  );
}

const SA = {
  grupo:{ marginBottom:12 },
  lbl:{ display:"block",fontSize:12,color:"#888",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px" },
  inp:{ width:"100%",background:"#111",border:"1px solid #333",color:"#fff",borderRadius:8,padding:"10px 12px",fontSize:14 },
  btnVerde:{ background:"#1D6F42",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer" },
  btnGris:{ background:"#333",color:"#ccc",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer" },
  btnPeq:{ flex:1,border:"none",borderRadius:6,padding:"5px 0",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer" },
};
