// ── HELPERS ───────────────────────────────────────────
const getTodayKey = () => {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};
const getToday = () => new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const fmt = n => "$"+Number(n||0).toFixed(0);
const getPrecio = (d, v) => {
  if (d.precios && v && d.precios[v] !== undefined) return d.precios[v];
  return d.precio || 0;
};
const calcSubtotal = (base, cant, extras, rellenos, nombre) => {
  const xq = (extras||[]).some(e => e.includes("Extra Queso")) ? PRECIO_EXTRA_QUESO : 0;
  let xr = 0;
  if (nombre === "Chilaquiles") xr = Math.max(0,(rellenos||[]).length-1)*PRECIO_RELLENO_CHILA;
  if (nombre === "Gorditas")    xr = (rellenos||[]).length*PRECIO_RELLENO_GORDITAS;
  return (base + xq + xr) * cant;
};
const getSiguienteId = async () => {
  const hoy = getTodayKey();
  const r = db.ref("contadores/"+hoy);
  const snap = await r.once("value");
  const n = (snap.val()||0)+1;
  await r.set(n);
  return n;
};
const ordenarItems = (items, menu) => {
  return [...items].sort((a,b) => {
    const nb = n => n.split(" (")[0].trim();
    const pri = item => {
      const nm = nb(item.nombre);
      const i  = ORDEN_COMIDA.indexOf(nm);
      if (i >= 0) return i;
      return menu[nm] && menu[nm].categoria==="comida" ? 900 : 1000;
    };
    return pri(a)-pri(b);
  });
};

// ── EXCEL ─────────────────────────────────────────────
function exportarExcel(pedidos, fecha) {
  const pp = pedidos.filter(p => p.fecha===fecha && p.estado!=="cancelado");
  const resumen = pp.map(p => ({
    "ID":            p.idDia ? "#"+p.idDia : "#"+String(p.ts||"").slice(-4),
    "Mesa/Cliente":  p.mesa||"Sin mesa",
    "Mesero":        p.mesero||"",
    "Tipo":          p.tipoServicio==="llevar"?"Para llevar":"En sitio",
    "Hora":          p.hora||"",
    "Estado":        p.estado||"",
    "Total ($)":     p.total||0,
  }));
  const detalle = [];
  pp.forEach(p => {
    (p.items||[]).forEach(item => {
      detalle.push({
        "ID Pedido":    p.idDia ? "#"+p.idDia : "#"+String(p.ts||"").slice(-4),
        "Mesa/Cliente": p.mesa||"Sin mesa",
        "Hora":         p.hora||"",
        "Producto":     item.nombre||"",
        "Cantidad":     item.cantidad||1,
        "Subtotal ($)": item.subtotal||0,
        "Entregado":    item.entregado?"Sí":"No",
      });
    });
  });
  const total = pp.reduce((s,p)=>s+(p.total||0),0);
  const totales = [
    {"Concepto":"Fecha",             "Valor":fecha},
    {"Concepto":"Total ventas",      "Valor":total},
    {"Concepto":"Número de pedidos", "Valor":pp.length},
    {"Concepto":"Ticket promedio",   "Valor":pp.length?Math.round(total/pp.length):0},
    {"Concepto":"Cancelados",        "Valor":pedidos.filter(p=>p.fecha===fecha&&p.estado==="cancelado").length},
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen),  "Pedidos");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detalle),  "Detalle");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(totales),  "Resumen");
  XLSX.writeFile(wb, "BenditoAntojo_"+fecha+".xlsx");
}

function LoginSistema({ onLogin }) {
  const [usuario, setUsuario] = useState("");
  const [pass,    setPass]    = useState("");
  const [error,   setError]   = useState("");
  const intentar = async () => {
    const key = usuario.toLowerCase().trim();
    const ub  = USUARIOS_BASE[key];
    if (ub && ub.pass===pass) { onLogin({usuario:key,rol:ub.rol}); return; }
    const snap = await db.ref("usuarios/"+key).once("value");
    const uf   = snap.val();
    if (uf && uf.pass===pass) { onLogin({usuario:key,rol:uf.rol}); return; }
    setError("Usuario o contraseña incorrectos");
    setTimeout(()=>setError(""),2500);
  };
  return (
    <div style={{minHeight:"100vh",background:"#0F0F0F",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1A1A1A",borderRadius:20,padding:36,width:"100%",maxWidth:340,border:"1px solid #333",textAlign:"center"}}>

        <p style={{color:"#666",fontSize:13,margin:"0 0 24px"}}>Sistema de Ventas</p>
        <input style={{...SL.inp,marginBottom:10}} placeholder="Usuario" value={usuario}
          onChange={e=>setUsuario(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()}/>
        <input type="password" style={{...SL.inp,marginBottom:error?8:16}} placeholder="Contraseña" value={pass}
          onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()}/>
        {error && <div style={{color:"#EF233C",fontSize:13,marginBottom:12}}>{"❌ "+error}</div>}
        <button style={SL.btn} onClick={intentar}>Entrar →</button>
        <p style={{color:"#444",fontSize:11,marginTop:16,marginBottom:0}}>Contacta al administrador si no tienes acceso</p>
      </div>
    </div>
  );
}

// ── CHIP EDITOR ───────────────────────────────────────
function ChipEditor({ value, onChange, placeholder }) {
  const chips = value ? value.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const [inp, setInp] = useState("");
  const add = () => {
    const v = inp.trim(); if(!v) return;
    onChange([...chips,v].join(", ")); setInp("");
  };
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {chips.map((c,i)=>(
          <span key={i} style={{background:"#333",color:"#fff",borderRadius:20,padding:"4px 10px",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
            {c}
            <button onClick={()=>onChange(chips.filter((_,j)=>j!==i).join(", "))} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
          </span>
        ))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input style={{flex:1,background:"#111",border:"1px solid #333",color:"#fff",borderRadius:8,padding:"8px 12px",fontSize:13}}
          placeholder={placeholder} value={inp}
          onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"||e.key===","){e.preventDefault();add();} }}/>
        <button onClick={add} style={{background:"#E85D04",border:"none",color:"#fff",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+</button>
      </div>
    </div>
  );
}

        <input type="number" style={{flex:1,background:"#111",border:"1px solid #333",color:"#fff",borderRadius:8,padding:"8px 10px",fontSize:13}}
          placeholder="Precio" value={pre} onChange={e=>setPre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>

      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────
function App() {
  const [sesion,  setSesion]  = useState(null);
  const [view,    setView]    = useState("central");
  const [pedidos, setPedidos] = useState({});
  const [menu,    setMenu]    = useState(MENU_DEFAULT);
  const [notif,   setNotif]   = useState(null);
  const [fbReady, setFbReady] = useState(false);

  useEffect(()=>{
    db.ref("pedidos").on("value", snap=>setPedidos(snap.val()||{}));
    db.ref("menu").on("value", snap=>{ const v=snap.val(); if(v) setMenu(v); else db.ref("menu").set(MENU_DEFAULT); });
    setFbReady(true);
  },[]);

  const showNotif = msg=>{ setNotif(msg); setTimeout(()=>setNotif(null),2800); };

  const addPedido = useCallback(async pedido=>{
    const id = await getSiguienteId();
    db.ref("pedidos").push({
      ...pedido,
      items: ordenarItems(pedido.items||[], menu),
      idDia: id,
      fecha: getTodayKey(),
      hora:  new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
      estado:"pendiente",
      ts:    Date.now(),
    });
    showNotif("✅ Pedido #"+id+" enviado a cocina");
  },[menu]);

  const agregarAlPedido = useCallback((id, actual, nuevos)=>{
    const yaEntregado = actual.estado==="entregado"||actual.estado==="cobrado";
    const viejos = (actual.items||[]).map(i=>({...i,esNuevo:false,entregado:yaEntregado?true:i.entregado}));
    const marcados = nuevos.map(i=>({...i,entregado:false,esNuevo:true}));
    const items = [...viejos,...marcados];
    db.ref("pedidos/"+id).update({items,total:items.reduce((s,i)=>s+(i.subtotal||0),0),estado:"pendiente",actualizado:new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})});
    showNotif("✅ Productos añadidos — pedido vuelve a Pendientes");
  },[]);

  const marcarItem = useCallback((id,actual,idx)=>{
    const items = (actual.items||[]).map((it,i)=>i===idx?{...it,entregado:true,esNuevo:false}:it);
    db.ref("pedidos/"+id).update({items});
    showNotif("✓ Producto marcado como entregado");
  },[]);

  const updateEstado = (id,estado)=>db.ref("pedidos/"+id).update({estado});
  const cancelar     = id=>db.ref("pedidos/"+id).update({estado:"cancelado"});
  const updateMenu   = nm=>{ db.ref("menu").set(nm); showNotif("✅ Menú actualizado"); };

  const pedidosArr = Object.entries(pedidos).map(([id,p])=>({...p,id})).sort((a,b)=>(a.ts||0)-(b.ts||0));
  const hoy        = pedidosArr.filter(p=>p.fecha===getTodayKey());
  const esAdmin    = sesion?.rol==="admin";

  if (!sesion) return <LoginSistema onLogin={setSesion}/>;

  return (
    <div style={S.root}>
      {notif && <div style={S.toast}>{notif}</div>}
      <nav style={S.nav}>
        <div style={S.brand}>
          <span style={{fontSize:22}}>🌮</span>
          <span style={S.brandText}>Bendito Antojo</span>
          {fbReady&&<span style={S.online}>● EN VIVO</span>}
        </div>
        <div style={S.navBtns}>
          {[{k:"central",l:"📺 Central"},{k:"pedido",l:"📱 Pedido"},{k:"reportes",l:"📊 Reportes",a:true},{k:"admin",l:"⚙️ Admin",a:true}]
            .filter(v=>!v.a||esAdmin)
            .map(v=>(
              <button key={v.k} style={{...S.navBtn,...(view===v.k?S.navBtnOn:{})}} onClick={()=>setView(v.k)}>{v.l}</button>
            ))}
          <button style={{...S.navBtn,color:"#EF233C",borderColor:"#EF233C"}} onClick={()=>setSesion(null)}>🚪</button>
        </div>
      </nav>
      <main style={S.main}>
        {view==="central"  && <Central  pedidos={hoy} onUpdate={updateEstado} onCancelar={cancelar} onAgregarAl={agregarAlPedido} onMarcarItem={marcarItem} menu={menu}/>}
        {view==="pedido"   && <Pedido   onAdd={addPedido} menu={menu}/>}
        {view==="reportes" && esAdmin && <Reportes pedidos={pedidosArr}/>}
        {view==="admin"    && esAdmin && <AdminView menu={menu} onUpdate={updateMenu}/>}
      </main>
    </div>
  );
}

// ── CENTRAL ───────────────────────────────────────────
function renderItemLinea(item) {
  const partes = item.nombre.includes("(")
    ? item.nombre.slice(item.nombre.indexOf("(")+1, item.nombre.lastIndexOf(")")).split("|").map(s=>s.trim())
    : [];
  const base   = item.nombre.split(" (")[0].trim();
  const tipo   = partes[0]||null;
  const xq     = partes.find(p=>p.includes("Extra Queso"))||null;
  const comp   = partes.filter(p=>p!==tipo&&!p.includes("Extra Queso")).join(", ");
  return [base,tipo,xq,comp||null].filter(Boolean).join(" | ");
}

// ── PEDIDO ────────────────────────────────────────────
function Pedido({ onAdd, menu }) {
  const [carrito,    setCarrito]    = useState([]);
  const [mesa,       setMesa]       = useState("");
  const [mesero,     setMesero]     = useState("");
  const [tipo,       setTipo]       = useState("");
  const [prodModal,  setProdModal]  = useState(null);
  const [filtro,     setFiltro]     = useState("comida");
  const [errores,    setErrores]    = useState({});
  const total = carrito.reduce((s,i)=>s+(i.subtotal||0),0);

  const confirmar = item=>{
    if(prodModal?.editIdx!==undefined) setCarrito(p=>p.map((it,i)=>i===prodModal.editIdx?item:it));
    else setCarrito(p=>[...p,item]);
    setProdModal(null);
  };
  const editarItem = idx=>{
    const item = carrito[idx];
    const base = item.nombre.split(" (")[0].trim();
    const d    = menu[base];
    if(!d) return;
    setProdModal({nombre:base,datos:d,editIdx:idx});
  };
  const enviar = ()=>{
    const e={};
    if(!mesa.trim())   e.mesa="Escribe la mesa o nombre";
    if(!mesero.trim()) e.mesero="Escribe el nombre del mesero";
    if(!tipo)          e.tipo="Selecciona el tipo de servicio";
    if(Object.keys(e).length){ setErrores(e); setTimeout(()=>setErrores({}),3000); return; }
    onAdd({items:carrito,mesa,mesero,tipoServicio:tipo,total});
    setCarrito([]); setMesa(""); setMesero(""); setTipo("");
  };

  return (
    <div style={{paddingBottom:130}}>
      {prodModal && <ModalProducto nombre={prodModal.nombre} producto={prodModal.datos} onConfirmar={confirmar} onCerrar={()=>setProdModal(null)}/>}

      <input style={{...S.mesaInput,...(errores.mesa?{border:"2px solid #EF233C"}:{})}}
        placeholder="🪑 Mesa / Nombre del cliente (obligatorio)" value={mesa} onChange={e=>setMesa(e.target.value)}/>
      {errores.mesa && <div style={S.errMsg}>{errores.mesa}</div>}

      <input style={{...S.mesaInput,...(errores.mesero?{border:"2px solid #EF233C"}:{})}}
        placeholder="👤 Nombre del mesero (obligatorio)" value={mesero} onChange={e=>setMesero(e.target.value)}/>
      {errores.mesero && <div style={S.errMsg}>{errores.mesero}</div>}

      <div style={{marginBottom:errores.tipo?4:16}}>
        <div style={{fontSize:13,color:"#aaa",marginBottom:8,fontWeight:600}}>{"📦 Tipo de servicio "}
          <span style={{color:"#EF233C"}}>*</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          {[{v:"sitio",l:"🍽️ En sitio"},{v:"llevar",l:"🥡 Para llevar"}].map(op=>(
            <button key={op.v}
              style={{flex:1,padding:"11px 0",borderRadius:12,
                border:"2px solid "+(tipo===op.v?"#E85D04":errores.tipo?"#EF233C":"#333"),
                background:tipo===op.v?"#E85D04":"#1A1A1A",
                color:tipo===op.v?"#fff":"#aaa",fontWeight:700,fontSize:14,cursor:"pointer"}}
              onClick={()=>setTipo(op.v)}>{op.l}</button>
          ))}
        </div>
      </div>
      {errores.tipo && <div style={S.errMsg}>{errores.tipo}</div>}

      <div style={S.filtroRow}>
        <button style={{...S.filtroBtn,...(filtro==="comida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("comida")}>🍽️ Comida</button>
        <button style={{...S.filtroBtn,...(filtro==="bebida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("bebida")}>🥤 Bebidas</button>
      </div>

      <div style={S.menuGrid}>
        {Object.entries(menu).filter(([,d])=>d.categoria===filtro).map(([n,d])=>(
          <button key={n} style={{...S.mCard,borderTop:"4px solid "+d.color,cursor:"pointer"}} onClick={()=>setProdModal({nombre:n,datos:d})}>
            <div style={{fontSize:28}}>{d.icon}</div>
            <div style={{fontWeight:700,fontSize:13,margin:"5px 0 3px"}}>{n}</div>
            <div style={{fontSize:11,color:"#aaa"}}>
              {d.precio?fmt(d.precio):d.precios?"desde "+fmt(Math.min(...Object.values(d.precios))):""}
              {d.unidad?" "+d.unidad:""}
            </div>
          </button>
        ))}
      </div>

      {carrito.length>0 && (
        <div style={S.carritoPanel}>
          <div style={{fontWeight:800,marginBottom:10,color:"#E85D04",fontSize:15}}>🛒 Carrito</div>
          {carrito.map((item,i)=>(
            <div key={i} style={{...S.carritoRow,flexWrap:"wrap",gap:4}}>
              <span style={{flex:1,fontSize:13,minWidth:0}}>{item.icon+" "+item.nombre}<span style={{color:"#E85D04",fontWeight:700,marginLeft:6}}>{"×"+item.cantidad}</span></span>
              <span style={{fontSize:13,color:"#E85D04",fontWeight:700,marginRight:6}}>{fmt(item.subtotal)}</span>
              {menu[item.nombre.split(" (")[0].trim()] && (
                <button style={{background:"#3A86FF",border:"none",color:"#fff",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",marginRight:4}} onClick={()=>editarItem(i)}>✏️</button>
              )}
              <button style={S.removeBtn} onClick={()=>setCarrito(p=>p.filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
          <div style={{borderTop:"1px solid #333",marginTop:10,paddingTop:10,fontWeight:800,fontSize:17,textAlign:"right"}}>{"Total: "+fmt(total)}</div>
          <button style={{...S.fab,...(!mesa.trim()||!mesero.trim()||!tipo?{opacity:0.5}:{})}} onClick={enviar}>
            {"🚀 Enviar Pedido · "+fmt(total)}
          </button>
        </div>
      )}
    </div>
  );
}

// ── REPORTES ──────────────────────────────────────────
function Reportes({ pedidos }) {
  const hoy     = getTodayKey();
  const validos = pedidos.filter(p=>p.estado!=="cancelado");
  const hoyP    = validos.filter(p=>p.fecha===hoy);
  const [modalExcel, setModalExcel] = useState(false);
  const [fechaX,     setFechaX]     = useState(hoy);
  const fechas = [...new Set(pedidos.map(p=>p.fecha).filter(Boolean))].sort().reverse();

  return (
    <div style={S.rWrap}>
      {modalExcel && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1A1A1A",borderRadius:16,padding:24,width:"100%",maxWidth:380,border:"1px solid #333"}}>
            <h3 style={{color:"#E85D04",margin:"0 0 16px"}}>📥 Exportar reporte</h3>
            <label style={{display:"block",fontSize:12,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Selecciona el día</label>
            <select style={{width:"100%",background:"#111",border:"1px solid #444",color:"#fff",borderRadius:8,padding:"10px 12px",fontSize:15,marginBottom:12}}
              value={fechaX} onChange={e=>setFechaX(e.target.value)}>
              {fechas.map(f=><option key={f} value={f}>{f+(f===hoy?" (hoy)":"")}</option>)}
            </select>
            <div style={{fontSize:13,color:"#aaa",marginBottom:16}}>
              {"Pedidos: "}
              <b style={{color:"#E85D04"}}>{pedidos.filter(p=>p.fecha===fechaX&&p.estado!=="cancelado").length}</b>
              {" · Total: "}
              <b style={{color:"#E85D04"}}>{fmt(pedidos.filter(p=>p.fecha===fechaX&&p.estado!=="cancelado").reduce((s,p)=>s+(p.total||0),0))}</b>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button style={{flex:1,padding:"11px 0",border:"none",borderRadius:10,background:"#333",color:"#ccc",fontWeight:700,cursor:"pointer"}} onClick={()=>setModalExcel(false)}>Cancelar</button>
              <button style={{flex:2,padding:"11px 0",border:"none",borderRadius:10,background:"#1D6F42",color:"#fff",fontWeight:800,cursor:"pointer"}} onClick={()=>{exportarExcel(pedidos,fechaX);setModalExcel(false);}}>📥 Descargar</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:16}}>
        <h3 style={{color:"#E85D04",margin:0}}>📊 Reportes</h3>
        <button style={{background:"#1D6F42",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer"}} onClick={()=>setModalExcel(true)}>📥 Exportar Excel</button>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        {[
          {n:fmt(hoyP.reduce((s,p)=>s+(p.total||0),0)),    l:"Ventas hoy"},
          {n:fmt(validos.reduce((s,p)=>s+(p.total||0),0)), l:"Ventas totales"},
          {n:hoyP.length,                                   l:"Pedidos hoy"},
          {n:pedidos.filter(p=>p.estado==="cancelado"&&p.fecha===hoy).length, l:"Cancelados hoy"},
        ].map((s,i)=>(
          <div key={i} style={S.statCard}><div style={S.statNum}>{s.n}</div><div style={S.statLbl}>{s.l}</div></div>
        ))}
      </div>
      <h4 style={{color:"#ccc",margin:"0 0 10px"}}>Últimos 30 pedidos</h4>
      {pedidos.slice(0,30).map(p=>(
        <div key={p.id} style={{...S.card,marginBottom:6,fontSize:13}}>
          <b>{"#"+(p.idDia||String(p.ts||"").slice(-4))}</b>{" — "+(p.mesa||"Sin mesa")}{p.mesero?" · 👤 "+p.mesero:""}{" — "+p.fecha+" "+p.hora+" — "+fmt(p.total)+" — "}
          <span style={{color:p.estado==="cancelado"?"#EF233C":p.estado==="cobrado"?"#1D6F42":"#06D6A0"}}>{p.estado}</span>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────
function AdminView({ menu, onUpdate }) {
  const [seccion,   setSeccion]   = useState("menu");
  const [tab,       setTab]       = useState("lista");
  const [editando,  setEditando]  = useState(null);
  const [form,      setForm]      = useState(fVacio());
  const [usuarios,  setUsuarios]  = useState({});
  const [tabU,      setTabU]      = useState("lista");
  const [editandoU, setEditandoU] = useState(null);
  const [formU,     setFormU]     = useState({usuario:"",pass:"",rol:"mesero"});
  const [notifA,    setNotifA]    = useState(null);

  useEffect(()=>{ db.ref("usuarios").on("value",snap=>setUsuarios(snap.val()||{})); },[]);
  const showA = msg=>{ setNotifA(msg); setTimeout(()=>setNotifA(null),2500); };

  function fVacio() {
    return {nombre:"",icon:"🍽️",color:"#E85D04",categoria:"comida",precio:"",unidad:"",
            rellenos:"",sabores:"",extras:"",tipoPrecio:"fijo",variantesPrecios:[],conExtraQueso:false};
  }

  const abrirNuevo = ()=>{ setForm(fVacio()); setEditando(null); setTab("nuevo"); };
  const abrirEditar = n=>{
    const d = menu[n];
    const tieneP = d.precios&&Object.keys(d.precios).length>0;
    setForm({
      nombre:n, icon:d.icon||"🍽️", color:d.color||"#E85D04", categoria:d.categoria||"comida",
      precio:d.precio||"", unidad:d.unidad||"",
      rellenos:(d.rellenos||[]).join(", "),
      sabores:(d.sabores||[]).join(", "),
      extras:(d.extras||[]).filter(e=>!e.includes("Extra Queso")).join(", "),
      tipoPrecio:tieneP?"variante":"fijo",
      variantesPrecios:tieneP?Object.entries(d.precios).map(([nm,p])=>({nombre:nm,precio:p})):[],
      conExtraQueso:(d.extras||[]).some(e=>e.includes("Extra Queso")),
    });
    setEditando(n); setTab("nuevo");
  };
  const eliminar = n=>{ if(!confirm("¿Eliminar \""+n+"\"?")) return; const nm={...menu}; delete nm[n]; onUpdate(nm); };
  const guardar = ()=>{
    const n = form.nombre.trim();
    if(!n){ alert("El nombre es obligatorio"); return; }
    const split = s=>s?s.split(",").map(x=>x.trim()).filter(Boolean):[];
    let precio=null,precios=null,variantes=null;
    if(form.tipoPrecio==="variante"){
      if(!form.variantesPrecios||form.variantesPrecios.length===0){ alert("Agrega al menos una opción con precio"); return; }
      precios={}; variantes=[];
      form.variantesPrecios.forEach(vp=>{ precios[vp.nombre]=vp.precio; variantes.push(vp.nombre); });
    } else {
      if(!form.precio){ alert("El precio es obligatorio"); return; }
      precio=Number(form.precio);
    }
    const extrasF = form.conExtraQueso&&form.categoria==="comida"?[...split(form.extras),"Extra Queso +$5"]:split(form.extras);
    const prod = {
      icon:form.icon||"🍽️", color:form.color||"#E85D04", categoria:form.categoria||"comida",
      ...(precio!==null?{precio}:{}),
      ...(form.unidad?{unidad:form.unidad}:{}),
      ...(variantes&&variantes.length?{variantes}:{}),
      ...(split(form.rellenos).length?{rellenos:split(form.rellenos)}:{}),
      ...(split(form.sabores).length?{sabores:split(form.sabores)}:{}),
      ...(extrasF.length?{extras:extrasF}:{}),
      ...(precios?{precios}:{}),
    };
    const nm={...menu};
    if(editando&&editando!==n) delete nm[editando];
    nm[n]=prod; onUpdate(nm); setTab("lista"); setForm(fVacio()); setEditando(null);
  };

  const guardarU = ()=>{
    const u=formU.usuario.trim().toLowerCase();
    if(!u){ alert("Usuario obligatorio"); return; }
    if(!formU.pass){ alert("Contraseña obligatoria"); return; }
    db.ref("usuarios/"+u).set({pass:formU.pass,rol:formU.rol});
    showA("✅ Usuario \""+u+"\" "+(editandoU?"actualizado":"creado"));
    setTabU("lista"); setEditandoU(null); setFormU({usuario:"",pass:"",rol:"mesero"});
  };
  const editarU = (u,d)=>{ setFormU({usuario:u,pass:d.pass,rol:d.rol}); setEditandoU(u); setTabU("nuevo"); };
  const eliminarU = u=>{ if(!confirm("¿Eliminar usuario \""+u+"\"?")) return; db.ref("usuarios/"+u).remove(); showA("🗑️ Usuario eliminado"); };

  return (
    <div style={S.rWrap}>
      {notifA && <div style={{...S.toast,top:70}}>{notifA}</div>}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <button style={{...SA.tabBtn,...(seccion==="menu"?SA.tabBtnOn:{})}} onClick={()=>setSeccion("menu")}>🍽️ Menú</button>
        <button style={{...SA.tabBtn,...(seccion==="usuarios"?SA.tabBtnOn:{})}} onClick={()=>setSeccion("usuarios")}>👥 Usuarios</button>
      </div>

      {seccion==="menu" && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{color:"#E85D04",margin:0}}>⚙️ Gestión de Menú</h3>
            {tab==="lista"?<button style={SA.btnVerde} onClick={abrirNuevo}>+ Nuevo producto</button>
                          :<button style={SA.btnGris}  onClick={()=>setTab("lista")}>← Volver</button>}
          </div>

          {tab==="lista" && (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {Object.entries(menu).map(([n,d])=>(
                <div key={n} style={{...S.card,borderTop:"4px solid "+d.color,padding:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{fontSize:24}}>{d.icon}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{n}</div>
                      <div style={{fontSize:11,color:"#aaa"}}>{d.categoria+" · "+(d.precio?fmt(d.precio):d.precios?"desde "+fmt(Math.min(...Object.values(d.precios))):"")} </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={{...SA.btnPeq,background:"#3A86FF"}} onClick={()=>abrirEditar(n)}>✏️ Editar</button>
                    <button style={{...SA.btnPeq,background:"#EF233C"}} onClick={()=>eliminar(n)}>🗑️ Eliminar</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab==="nuevo" && (
            <div style={{maxWidth:500}}>
              <h4 style={{color:"#ccc",marginTop:0,marginBottom:16}}>{editando?"✏️ Editando: "+editando:"✨ Nuevo producto"}</h4>

              <div style={SA.bloque}>
                <div style={SA.bloqueTitle}>1. Información básica</div>
                <div style={SA.grupo}>
                  <label style={SA.lbl}>Nombre *</label>
                  <input style={SA.inp} placeholder="Ej: Tlayuda, Pozole…" value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))}/>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
                  <div style={{...SA.grupo,flex:1,marginBottom:0}}>
                    <label style={SA.lbl}>Categoría</label>
                    <select style={SA.inp} value={form.categoria} onChange={e=>setForm(p=>({...p,categoria:e.target.value}))}>
                      <option value="comida">🍽️ Comida</option>
                      <option value="bebida">🥤 Bebida</option>
                    </select>
                  </div>
                  <div style={{...SA.grupo,flex:1,marginBottom:0}}>
                    <label style={SA.lbl}>Ícono (emoji)</label>
                    <input style={SA.inp} placeholder="🍽️" value={form.icon} onChange={e=>setForm(p=>({...p,icon:e.target.value}))}/>
                  </div>
                  <div style={{...SA.grupo,marginBottom:0}}>
                    <label style={SA.lbl}>Color</label>
                    <input type="color" value={form.color} onChange={e=>setForm(p=>({...p,color:e.target.value}))}
                      style={{width:48,height:42,borderRadius:8,border:"none",cursor:"pointer",display:"block"}}/>
                  </div>
                </div>
              </div>

              <div style={SA.bloque}>
                <div style={SA.bloqueTitle}>2. Precio</div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <button style={{...SA.chipOpt,...(form.tipoPrecio!=="variante"?SA.chipOptOn:{})}} onClick={()=>setForm(p=>({...p,tipoPrecio:"fijo"}))}>💲 Precio fijo</button>
                  <button style={{...SA.chipOpt,...(form.tipoPrecio==="variante"?SA.chipOptOn:{})}} onClick={()=>setForm(p=>({...p,tipoPrecio:"variante"}))}>📊 Por tamaño/tipo</button>
                </div>
                {form.tipoPrecio!=="variante"?(
                  <div style={{display:"flex",gap:10}}>
                    <div style={{...SA.grupo,flex:2,marginBottom:0}}>
                      <label style={SA.lbl}>Precio ($) *</label>
                      <input type="number" style={SA.inp} placeholder="Ej: 55" value={form.precio} onChange={e=>setForm(p=>({...p,precio:e.target.value}))}/>
                    </div>
                    <div style={{...SA.grupo,flex:1,marginBottom:0}}>
                      <label style={SA.lbl}>Unidad</label>
                      <input style={SA.inp} placeholder="c/u" value={form.unidad} onChange={e=>setForm(p=>({...p,unidad:e.target.value}))}/>
                    </div>
                  </div>
                ):(
                  <VariantePrecioEditor value={form.variantesPrecios||[]} onChange={vp=>setForm(p=>({...p,variantesPrecios:vp}))}/>
                )}
              </div>

              <div style={SA.bloque}>
                <div style={SA.bloqueTitle}>{"3. Opciones "}<span style={{color:"#666",fontWeight:400,fontSize:12}}>(opcionales)</span></div>
                <div style={SA.grupo}>
                  <label style={SA.lbl}>Rellenos / Ingrediente</label>
                  <ChipEditor value={form.rellenos||""} onChange={v=>setForm(p=>({...p,rellenos:v}))} placeholder="Escribe y presiona Enter"/>
                </div>
                <div style={SA.grupo}>
                  <label style={SA.lbl}>Sabores</label>
                  <ChipEditor value={form.sabores||""} onChange={v=>setForm(p=>({...p,sabores:v}))} placeholder="Escribe y presiona Enter"/>
                </div>
                <div style={{...SA.grupo,marginBottom:0}}>
                  <label style={SA.lbl}>Extras / Complementos</label>
                  <ChipEditor value={form.extras||""} onChange={v=>setForm(p=>({...p,extras:v}))} placeholder="Escribe y presiona Enter"/>
                  {form.categoria==="comida" && (
                    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#aaa",marginTop:8}}>
                      <input type="checkbox" checked={form.conExtraQueso||false} onChange={e=>setForm(p=>({...p,conExtraQueso:e.target.checked}))} style={{width:16,height:16}}/>
                      Incluir "Extra Queso +$5"
                    </label>
                  )}
                </div>
              </div>

              <button style={{...SA.btnVerde,width:"100%",padding:"14px 0",fontSize:15,marginTop:4}} onClick={guardar}>
                {"💾 "+(editando?"Guardar cambios":"Crear producto")}
              </button>
            </div>
          )}
        </div>
      )}

      {seccion==="usuarios" && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{color:"#E85D04",margin:0}}>👥 Gestión de Usuarios</h3>
            {tabU==="lista"
              ?<button style={SA.btnVerde} onClick={()=>{setFormU({usuario:"",pass:"",rol:"mesero"});setEditandoU(null);setTabU("nuevo");}}>+ Nuevo usuario</button>
              :<button style={SA.btnGris}  onClick={()=>setTabU("lista")}>← Volver</button>}
          </div>
          {tabU==="lista" && (
            <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:480}}>
              {[{u:"admin",rol:"admin"},{u:"mesero",rol:"mesero"}].map(({u,rol})=>(
                <div key={u} style={{...S.card,display:"flex",alignItems:"center",gap:12,padding:14}}>
                  <span style={{fontSize:28}}>👤</span>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{u}</div><div style={{fontSize:12,color:"#aaa"}}>{rol+" · contraseña fija"}</div></div>
                  <span style={{fontSize:11,color:"#555",background:"#333",padding:"2px 8px",borderRadius:10}}>sistema</span>
                </div>
              ))}
              {Object.entries(usuarios).map(([u,d])=>(
                <div key={u} style={{...S.card,display:"flex",alignItems:"center",gap:12,padding:14}}>
                  <span style={{fontSize:28}}>👤</span>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{u}</div><div style={{fontSize:12,color:"#aaa"}}>{d.rol}</div></div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={{...SA.btnPeq,background:"#3A86FF",padding:"5px 10px"}} onClick={()=>editarU(u,d)}>✏️</button>
                    <button style={{...SA.btnPeq,background:"#EF233C",padding:"5px 10px"}} onClick={()=>eliminarU(u)}>🗑️</button>
                  </div>
                </div>
              ))}
              {Object.keys(usuarios).length===0&&<div style={{color:"#555",fontSize:14,padding:10}}>No hay usuarios adicionales.</div>}
            </div>
          )}
          {tabU==="nuevo" && (
            <div style={{maxWidth:400}}>
              <h4 style={{color:"#ccc",marginTop:0}}>{editandoU?"Editando: "+editandoU:"Nuevo usuario"}</h4>
              <div style={SA.grupo}><label style={SA.lbl}>Usuario *</label><input style={SA.inp} placeholder="Ej: juan" disabled={!!editandoU} value={formU.usuario} onChange={e=>setFormU(p=>({...p,usuario:e.target.value.toLowerCase()}))}/></div>
              <div style={SA.grupo}><label style={SA.lbl}>Contraseña *</label><input style={SA.inp} placeholder="Contraseña" value={formU.pass} onChange={e=>setFormU(p=>({...p,pass:e.target.value}))}/></div>
              <div style={SA.grupo}>
                <label style={SA.lbl}>Rol</label>
                <select style={SA.inp} value={formU.rol} onChange={e=>setFormU(p=>({...p,rol:e.target.value}))}>
                  <option value="mesero">Mesero</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button style={{...SA.btnVerde,width:"100%",padding:"13px 0",fontSize:15}} onClick={guardarU}>{"💾 "+(editandoU?"Guardar cambios":"Crear usuario")}</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
