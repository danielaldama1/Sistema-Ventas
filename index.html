<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0F0F0F"/>
  <title>🌮 La Taquiza Sagrada</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat (más simple, sin módulos) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0F0F0F; color: #F0EBE3; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    @keyframes slideDown {
      from { opacity:0; transform:translateX(-50%) translateY(-10px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; transform:scale(.97); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes pulse {
      0%,100% { box-shadow:0 4px 20px rgba(232,93,4,.5); }
      50%      { box-shadow:0 4px 32px rgba(232,93,4,.9); }
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }
    .toast    { animation: slideDown .25s ease; }
    .drawer   { animation: slideUp  .28s ease; }
    .fadeIn   { animation: fadeIn   .2s ease;  }
    .fab      { animation: pulse    2s infinite; }
    .blink    { animation: blink    1.8s infinite; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
      <div style="font-size:60px">🌮</div>
      <div style="color:#E85D04;font-weight:800;font-size:24px;letter-spacing:1px">La Taquiza Sagrada</div>
      <div style="color:#555;font-size:14px">Iniciando sistema...</div>
    </div>
  </div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
