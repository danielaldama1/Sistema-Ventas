<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas - Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="margin: 0; background: #0F0F0F; color: #fff; font-family: system-ui, sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBmRE258LdtlR5jAo3ChN9jG94C3MsMI68",
            authDomain: "sistema-ventas-4ae00.firebaseapp.com",
            databaseURL: "https://sistema-ventas-4ae00-default-rtdb.firebaseio.com",
            projectId: "sistema-ventas-4ae00",
            storageBucket: "sistema-ventas-4ae00.firebasestorage.app",
            messagingSenderId: "774049154998",
            appId: "1:774049154998:web:6a5e9297dc52abf3cc2317"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MENU_COMPLETO = {
            "Chilaquiles":  { icon:"🍳", color:"#E85D04", precio:55 },
            "Enchiladas":   { icon:"🌯", color:"#C1121F", precio:55 },
            "Tacos":        { icon:"🌮", color:"#F48C06", precio:28 },
            "Pambazos":     { icon:"🥙", color:"#DC2F02", precio:28 },
            "Quesadillas":  { icon:"🫓", color:"#9D4EDD", precio:30 },
            "Huaraches":    { icon:"🫔", color:"#3A86FF", precio:40 },
            "Gorditas":     { icon:"🫔", color:"#06D6A0", precio:25 },
            "Agua":         { icon:"💧", color:"#00B4D8", precio:25 },
            "Café":         { icon:"☕", color:"#6F4E37", precio:20 },
            "Atole":        { icon:"🥛", color:"#F4A261", precio:25 },
            "Refresco":     { icon:"🥤", color:"#EF233C", precio:25 },
            "Michelada":    { icon:"🍺", color:"#FFBA08", precio:45 },
            "Mojito":       { icon:"🍹", color:"#40916C", precio:60 }
        };

        function App() {
            const [view, setView] = useState("central");
            const [pedidos, setPedidos] = useState({});
            const [carrito, setCarrito] = useState([]);
            const [mesa, setMesa] = useState("");

            useEffect(() => {
                db.ref("pedidos").on("value", s => setPedidos(s.val() || {}));
            }, []);

            const enviar = () => {
                if(!mesa) return alert("Indica mesa");
                db.ref("pedidos").push({
                    mesa, items: carrito, 
                    total: carrito.reduce((a,b)=>a+b.precio,0),
                    estado: "pendiente",
                    hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                setCarrito([]); setMesa(""); setView("central");
            };

            return (
                <div>
                    <nav style={S.nav}>
                        <div style={S.brand}>🌮 <b>MiTaquería</b></div>
                        <div style={S.navBtns}>
                            <button onClick={()=>setView("central")} style={S.navBtn}>📺 Cocina</button>
                            <button onClick={()=>setView("pedido")} style={S.navBtn}>📱 Venta</button>
                        </div>
                    </nav>

                    <main style={{padding: 16}}>
                        {view === "central" ? (
                            <div style={S.kanban}>
                                {Object.entries(pedidos).reverse().map(([id, p]) => (
                                    p.estado === "pendiente" && (
                                        <div key={id} style={S.card}>
                                            <div style={{display:"flex", justifyContent:"space-between"}}>
                                                <b>Mesa: {p.mesa}</b>
                                                <small>{p.hora}</small>
                                            </div>
                                            <div style={{margin:"10px 0"}}>
                                                {p.items.map((it, i) => <div key={i}>• {it.nombre}</div>)}
                                            </div>
                                            <button onClick={()=>db.ref(`pedidos/${id}`).update({estado:"listo"})} style={S.btnListo}>Listo</button>
                                        </div>
                                    )
                                ))}
                            </div>
                        ) : (
                            <div>
                                <input placeholder="Nombre de mesa..." value={mesa} onChange={e=>setMesa(e.target.value)} style={S.input}/>
                                <div style={S.grid}>
                                    {Object.entries(MENU_COMPLETO).map(([n, d]) => (
                                        <button key={n} onClick={()=>setCarrito([...carrito, {nombre:n, precio:d.precio}])} style={{...S.mCard, borderTop:`4px solid ${d.color}`}}>
                                            <div style={{fontSize:24}}>{d.icon}</div>
                                            <div>{n}</div>
                                        </button>
                                    ))}
                                </div>
                                {carrito.length > 0 && <button onClick={enviar} style={S.fab}>Enviar Pedido (${carrito.reduce((a,b)=>a+b.precio,0)})</button>}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const S = {
            nav: { display:"flex", justifyContent:"space-between", padding:"10px 16px", background:"#1A1A1A", borderBottom:"2px solid #E85D04" },
            brand: { color:"#E85D04", fontSize:20 },
            navBtns: { display:"flex", gap:8 },
            navBtn: { background:"#333", color:"#fff", border:"none", padding:"6px 12px", borderRadius:6 },
            kanban: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(250px, 1fr))", gap:12 },
            card: { background:"#1A1A1A", padding:15, borderRadius:12, border:"1px solid #333" },
            btnListo: { width:"100%", background:"#06D6A0", border:"none", padding:8, borderRadius:6, fontWeight:"bold" },
            input: { width:"100%", padding:12, background:"#1A1A1A", border:"1px solid #333", color:"#fff", borderRadius:8, marginBottom:16, boxSizing:"border-box" },
            grid: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(100px, 1fr))", gap:10 },
            mCard: { background:"#1A1A1A", color:"#fff", padding:12, borderRadius:10, border:"none" },
            fab: { position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"#E85D04", color:"#fff", border:"none", padding:"15px 40px", borderRadius:30, fontWeight:"bold", width:"80%" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
