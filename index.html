<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiTaquería</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0F0F0F; }
    select option { background: #111; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ═══════════════════════════════════════
    // FIREBASE CONFIG
    // ═══════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyBmRE258LdtlR5jAo3ChN9jG94C3MsMI68",
      authDomain: "sistema-ventas-4ae00.firebaseapp.com",
      databaseURL: "https://sistema-ventas-4ae00-default-rtdb.firebaseio.com",
      projectId: "sistema-ventas-4ae00",
      storageBucket: "sistema-ventas-4ae00.firebasestorage.app",
      messagingSenderId: "774049154998",
      appId: "1:774049154998:web:6a5e9297dc52abf3cc2317"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMIN_PASSWORD = "Angeles14";

    // ═══════════════════════════════════════
    // MENÚ DEFAULT
    // ═══════════════════════════════════════
    const MENU_DEFAULT = {
      "Chilaquiles":  { icon:"🍳", color:"#E85D04", categoria:"comida", variantes:["Verdes","Rojos"], precio:55 },
      "Enchiladas":   { icon:"🌯", color:"#C1121F", categoria:"comida", variantes:["Sencillas","Pollo","Otro"], precio:55 },
      "Tacos":        { icon:"🌮", color:"#F48C06", categoria:"comida", variantes:["Suadero","Longaniza","Campechanos"], precio:28 },
      "Pambazos":     { icon:"🥙", color:"#DC2F02", categoria:"comida", variantes:["Chicharrón","Queso","Tinga","Papa con Longaniza","Hongos","Suadero"], precio:28 },
      "Quesadillas":  { icon:"🫓", color:"#9D4EDD", categoria:"comida", variantes:["Chicharrón","Queso","Tinga","Papa con Longaniza","Hongos","Suadero"], precio:30 },
      "Huaraches":    { icon:"🫔", color:"#3A86FF", categoria:"comida", variantes:["Suadero","Longaniza","Campechanos","Otro"], precio:40 },
      "Gorditas":     { icon:"🫔", color:"#06D6A0", categoria:"comida", variantes:["Suadero","Otro"], precio:25 },
      "Agua":         { icon:"💧", color:"#00B4D8", categoria:"bebida", variantes:["1/2 L","1 L"], precios:{"1/2 L":25,"1 L":35} },
      "Café":         { icon:"☕", color:"#6F4E37", categoria:"bebida", variantes:["1/4 L","1/2 L","1 L"], precios:{"1/4 L":20,"1/2 L":37,"1 L":70} },
      "Atole":        { icon:"🥛", color:"#F4A261", categoria:"bebida", variantes:["1/4 L","1/2 L","1 L"], precios:{"1/4 L":25,"1/2 L":45,"1 L":85} },
      "Refresco":     { icon:"🥤", color:"#EF233C", categoria:"bebida", variantes:["Lata/Botella"], precios:{"Lata/Botella":25} },
      "Michelada":    { icon:"🍺", color:"#FFBA08", categoria:"bebida", variantes:["Corona 1/2 L","Corona 1 L","Victoria 1/2 L","Victoria 1 L"], precios:{"Corona 1/2 L":45,"Corona 1 L":90,"Victoria 1/2 L":45,"Victoria 1 L":90} },
      "Mojito":       { icon:"🍹", color:"#40916C", categoria:"bebida", variantes:["Limón 1/2 L","Limón 1 L","Fresa 1/2 L","Fresa 1 L","Frutos Rojos 1/2 L","Frutos Rojos 1 L"], precios:{"Limón 1/2 L":60,"Limón 1 L":100,"Fresa 1/2 L":60,"Fresa 1 L":100,"Frutos Rojos 1/2 L":70,"Frutos Rojos 1 L":120} },
      "Caguama":      { icon:"🍻", color:"#B5830A", categoria:"bebida", variantes:["Caguama"], precios:{"Caguama":55} },
    };

    // ═══════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════
    const getTodayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };
    const getToday = () => new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    const fmt = n => `$${Number(n||0).toFixed(0)}`;
    const getPrecio = (datos, variante) => {
      if (datos.precios && variante && datos.precios[variante] !== undefined) return datos.precios[variante];
      return datos.precio || 0;
    };

    // ═══════════════════════════════════════
    // APP PRINCIPAL
    // ═══════════════════════════════════════
    function App() {
      const [view, setView]       = useState("central");
      const [pedidos, setPedidos] = useState({});
      const [menu, setMenu]       = useState(MENU_DEFAULT);
      const [notif, setNotif]     = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [fbReady, setFbReady] = useState(false);

      useEffect(() => {
        db.ref("pedidos").on("value", snap => setPedidos(snap.val() || {}));
        db.ref("menu").on("value", snap => {
          const val = snap.val();
          if (val) setMenu(val);
          else db.ref("menu").set(MENU_DEFAULT);
        });
        setFbReady(true);
      }, []);

      const showNotif = msg => { setNotif(msg); setTimeout(() => setNotif(null), 2500); };

      const addPedido = useCallback(pedido => {
        db.ref("pedidos").push({
          ...pedido,
          fecha: getTodayKey(),
          hora: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
          estado: "pendiente",
          ts: Date.now()
        });
        showNotif("✅ Pedido enviado a cocina");
      }, []);

      const agregarAlPedido = useCallback((id, pedidoActual, itemsNuevos) => {
        const itemsActualizados = [...(pedidoActual.items || []), ...itemsNuevos];
        const nuevoTotal = itemsActualizados.reduce((s,i) => s + (i.subtotal||0), 0);
        db.ref(`pedidos/${id}`).update({
          items: itemsActualizados,
          total: nuevoTotal,
          estado: "pendiente",
          actualizado: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
        });
        showNotif("✅ Productos añadidos — pedido regresó a Pendientes");
      }, []);

      const updateEstado = (id, estado) => db.ref(`pedidos/${id}`).update({ estado });
      const cancelar     = id => db.ref(`pedidos/${id}`).update({ estado: "cancelado" });

      const pedidosArr = Object.entries(pedidos).map(([id,p]) => ({...p,id})).sort((a,b) => (b.ts||0)-(a.ts||0));
      const hoy = pedidosArr.filter(p => p.fecha === getTodayKey());

      return (
        <div style={S.root}>
          {notif && <div style={S.toast}>{notif}</div>}
          <nav style={S.nav}>
            <div style={S.brand}>
              <span style={{fontSize:26}}>🌮</span>
              <span style={S.brandText}>MiTaquería</span>
              {fbReady && <span style={S.online}>● EN VIVO</span>}
            </div>
            <div style={S.navBtns}>
              {[{k:"central",l:"📺 Central"},{k:"pedido",l:"📱 Pedido"},{k:"reportes",l:"📊 Reportes"},{k:"admin",l:"⚙️ Admin"}].map(v => (
                <button key={v.k}
                  style={{...S.navBtn,...(view===v.k?S.navBtnOn:{})}}
                  onClick={() => {
                    if ((v.k==="reportes"||v.k==="admin") && !isAdmin) setView("login");
                    else setView(v.k);
                  }}>
                  {v.l}
                </button>
              ))}
            </div>
          </nav>
          <main style={S.main}>
            {view==="central"  && <Central pedidos={hoy} onUpdate={updateEstado} onCancelar={cancelar} onAgregarAl={agregarAlPedido} menu={menu}/>}
            {view==="pedido"   && <Pedido  onAdd={addPedido} menu={menu}/>}
            {view==="reportes" && isAdmin && <Reportes pedidos={pedidosArr}/>}
            {view==="admin"    && isAdmin && <AdminView menu={menu}/>}
            {view==="login"    && <Login onLogin={ok => { if(ok){ setIsAdmin(true); setView("reportes"); }}}/>}
          </main>
        </div>
      );
    }

    // ═══════════════════════════════════════
    // CENTRAL — tablero kanban
    // ═══════════════════════════════════════
    function Central({ pedidos, onUpdate, onCancelar, onAgregarAl, menu }) {
      const [pedidoSelec, setPedidoSelec] = useState(null);
      const [carritoExtra, setCarritoExtra] = useState([]);
      const [varSel, setVarSel] = useState({});

      const cols = [
        { k:"pendiente",  l:"⏳ Pendientes", c:"#FFBA08", acc:[{l:"▶ Preparar",e:"en_proceso",c:"#3A86FF"}] },
        { k:"en_proceso", l:"👨‍🍳 En Proceso", c:"#3A86FF", acc:[{l:"✅ Listo",   e:"listo",    c:"#06D6A0"}] },
        { k:"listo",      l:"✅ Listos",      c:"#06D6A0", acc:[{l:"🤝 Entregar",e:"entregado",c:"#888"}]    },
        { k:"entregado",  l:"🤝 Entregados",  c:"#888",    acc:[] },
      ];

      const agregarExtra = (nombre, datos) => {
        const variante = varSel[nombre] || (datos.variantes&&datos.variantes[0]) || null;
        const precio   = getPrecio(datos, variante);
        const label    = variante ? `${nombre} (${variante})` : nombre;
        setCarritoExtra(prev => [...prev, {nombre:label, cantidad:1, subtotal:precio, icon:datos.icon}]);
      };

      const confirmar = () => {
        if (!pedidoSelec || carritoExtra.length===0) return;
        onAgregarAl(pedidoSelec.id, pedidoSelec, carritoExtra);
        setPedidoSelec(null);
        setCarritoExtra([]);
      };

      return (
        <div>
          <div style={S.centralDate}>📅 {getToday()}</div>

          {pedidoSelec && (
            <div style={S.overlay}>
              <div style={S.modal}>
                <h3 style={{margin:"0 0 12px",color:"#E85D04"}}>
                  ➕ Agregar a pedido #{String(pedidoSelec.ts).slice(-4)} — {pedidoSelec.mesa||"Sin mesa"}
                </h3>
                <div style={{maxHeight:"40vh",overflowY:"auto"}}>
                  {Object.entries(menu).map(([nombre, datos]) => (
                    <div key={nombre} style={S.modalRow}>
                      <span style={{fontSize:13}}>{datos.icon} <b>{nombre}</b></span>
                      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                        {datos.variantes && datos.variantes.length > 1 && (
                          <select style={S.selectSm}
                            value={varSel[nombre]||datos.variantes[0]}
                            onChange={e=>setVarSel(prev=>({...prev,[nombre]:e.target.value}))}>
                            {datos.variantes.map(v=>(
                              <option key={v} value={v}>{v} — {fmt(getPrecio(datos,v))}</option>
                            ))}
                          </select>
                        )}
                        <button style={S.modalAddBtn} onClick={()=>agregarExtra(nombre,datos)}>
                          + {fmt(getPrecio(datos, varSel[nombre]||datos.variantes?.[0]))}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
                {carritoExtra.length > 0 && (
                  <div style={{marginTop:10,background:"#111",padding:10,borderRadius:8}}>
                    <b>Por agregar:</b>
                    {carritoExtra.map((i,idx)=>(
                      <div key={idx} style={{fontSize:12,color:"#ccc",padding:"2px 0"}}>{i.icon} {i.nombre} — {fmt(i.subtotal)}</div>
                    ))}
                    <div style={{marginTop:6,fontWeight:800,color:"#E85D04"}}>
                      Extra: {fmt(carritoExtra.reduce((s,i)=>s+i.subtotal,0))}
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={{...S.btn,background:"#06D6A0",flex:2}} onClick={confirmar} disabled={carritoExtra.length===0}>✅ Confirmar</button>
                  <button style={{...S.btn,background:"#555",flex:1}} onClick={()=>{setPedidoSelec(null);setCarritoExtra([])}}>✕ Cerrar</button>
                </div>
              </div>
            </div>
          )}

          <div style={S.kanban}>
            {cols.map(col => (
              <div key={col.k} style={S.kCol}>
                <div style={{...S.kHead,borderBottom:`3px solid ${col.c}`,color:col.c}}>{col.l}</div>
                {pedidos.filter(p=>p.estado===col.k).map(p=>(
                  <div key={p.id} style={{...S.card,...(p.actualizado?{border:"2px solid #E85D04"}:{})}}>
                    <div style={S.cardTop}>
                      <b>#{String(p.ts||"").slice(-4)}</b> — {p.mesa||"Sin mesa"}<br/>
                      <small style={{color:"#aaa"}}>{p.hora}{p.actualizado?` · act. ${p.actualizado}`:""} · {fmt(p.total)}</small>
                    </div>
                    <div style={S.itemsList}>
                      {(p.items||[]).map((item,i)=>(
                        <div key={i} style={{fontSize:12,color:"#ccc",padding:"1px 0"}}>{item.icon} {item.nombre} ×{item.cantidad}</div>
                      ))}
                    </div>
                    <div style={S.cardAcc}>
                      {col.acc.map(a=>(
                        <button key={a.e} style={{...S.accBtn,background:a.c}} onClick={()=>onUpdate(p.id,a.e)}>{a.l}</button>
                      ))}
                      {(col.k==="pendiente"||col.k==="en_proceso") && (
                        <button style={{...S.accBtn,background:"#9D4EDD"}} onClick={()=>setPedidoSelec(p)}>➕</button>
                      )}
                      {col.k==="pendiente" && (
                        <button style={{...S.accBtn,background:"#EF233C"}} onClick={()=>onCancelar(p.id)}>✕</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════
    // PEDIDO
    // ═══════════════════════════════════════
    function Pedido({ onAdd, menu }) {
      const [carrito, setCarrito] = useState([]);
      const [mesa, setMesa]       = useState("");
      const [varSel, setVarSel]   = useState({});
      const total = carrito.reduce((s,i)=>s+(i.subtotal||0),0);

      const agregar = (nombre, datos) => {
        const variante = varSel[nombre] || (datos.variantes&&datos.variantes[0]) || null;
        const precio   = getPrecio(datos, variante);
        const label    = variante ? `${nombre} (${variante})` : nombre;
        setCarrito(prev=>[...prev,{nombre:label,cantidad:1,subtotal:precio,icon:datos.icon}]);
      };

      const renderGrid = (items) => (
        <div style={S.menuGrid}>
          {items.map(([n,d])=>(
            <div key={n} style={{...S.mCard,borderTop:`4px solid ${d.color}`}}>
              <div style={{fontSize:26}}>{d.icon}</div>
              <div style={{fontWeight:700,fontSize:13,margin:"4px 0"}}>{n}</div>
              {d.variantes && d.variantes.length > 0 && (
                <select style={S.select}
                  value={varSel[n]||d.variantes[0]}
                  onChange={e=>setVarSel(prev=>({...prev,[n]:e.target.value}))}>
                  {d.variantes.map(v=>(
                    <option key={v} value={v}>{v} — {fmt(getPrecio(d,v))}</option>
                  ))}
                </select>
              )}
              <div style={{fontSize:12,color:"#aaa",margin:"3px 0"}}>{fmt(getPrecio(d,varSel[n]||d.variantes?.[0]))}</div>
              <button style={{...S.addBtn,background:d.color}} onClick={()=>agregar(n,d)}>+ Agregar</button>
            </div>
          ))}
        </div>
      );

      return (
        <div style={{paddingBottom:100}}>
          <input style={S.mesaInput} placeholder="Mesa / Nombre del cliente" value={mesa} onChange={e=>setMesa(e.target.value)}/>
          <div style={S.secTitle}>🍽️ Comida</div>
          {renderGrid(Object.entries(menu).filter(([,d])=>d.categoria==="comida"))}
          <div style={S.secTitle}>🥤 Bebidas</div>
          {renderGrid(Object.entries(menu).filter(([,d])=>d.categoria==="bebida"))}
          {carrito.length > 0 && (
            <div style={S.carritoPanel}>
              <div style={{fontWeight:800,marginBottom:8,color:"#E85D04"}}>🛒 Carrito</div>
              {carrito.map((item,i)=>(
                <div key={i} style={S.carritoRow}>
                  <span>{item.icon} {item.nombre}</span>
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    {fmt(item.subtotal)}
                    <button style={S.removeBtn} onClick={()=>setCarrito(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
                  </span>
                </div>
              ))}
              <div style={{borderTop:"1px solid #333",marginTop:8,paddingTop:8,fontWeight:800,fontSize:16}}>Total: {fmt(total)}</div>
              <button style={S.fab} onClick={()=>{onAdd({items:carrito,mesa,total});setCarrito([]);setMesa("");}}>
                🚀 Enviar Pedido ({fmt(total)})
              </button>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════
    // LOGIN
    // ═══════════════════════════════════════
    function Login({ onLogin }) {
      const [pass, setPass]   = useState("");
      const [error, setError] = useState(false);
      const intentar = () => {
        if (pass === ADMIN_PASSWORD) { onLogin(true); }
        else { setError(true); setTimeout(()=>setError(false),2000); }
      };
      return (
        <div style={S.loginWrap}>
          <div style={S.loginBox}>
            <div style={{fontSize:40,marginBottom:8}}>🔐</div>
            <h3 style={{color:"#E85D04",margin:"0 0 16px"}}>Acceso Admin</h3>
            <input
              type="password"
              style={{...S.loginInput,...(error?{border:"2px solid #EF233C"}:{})}}
              placeholder="Contraseña"
              value={pass}
              onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&intentar()}
            />
            {error && <div style={{color:"#EF233C",fontSize:13,marginBottom:8}}>❌ Contraseña incorrecta</div>}
            <button style={S.loginBtn} onClick={intentar}>Entrar</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════
    // REPORTES
    // ═══════════════════════════════════════
    function Reportes({ pedidos }) {
      const hoy     = getTodayKey();
      const validos = pedidos.filter(p=>p.estado!=="cancelado");
      const hoyPeds = validos.filter(p=>p.fecha===hoy);
      return (
        <div style={S.rWrap}>
          <h3 style={{color:"#E85D04"}}>📊 Reportes</h3>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
            {[
              {n:fmt(hoyPeds.reduce((s,p)=>s+(p.total||0),0)), l:"Ventas hoy"},
              {n:fmt(validos.reduce((s,p)=>s+(p.total||0),0)), l:"Ventas totales"},
              {n:hoyPeds.length,                                l:"Pedidos hoy"},
              {n:pedidos.filter(p=>p.estado==="cancelado"&&p.fecha===hoy).length, l:"Cancelados hoy"},
            ].map((s,i)=>(
              <div key={i} style={S.statCard}>
                <div style={S.statNum}>{s.n}</div>
                <div style={S.statLbl}>{s.l}</div>
              </div>
            ))}
          </div>
          <h4 style={{color:"#ccc",margin:"0 0 10px"}}>Últimos 20 pedidos</h4>
          {pedidos.slice(0,20).map(p=>(
            <div key={p.id} style={{...S.card,marginBottom:6,fontSize:13}}>
              <b>#{String(p.ts||"").slice(-4)}</b> — {p.mesa||"Sin mesa"} — {p.fecha} {p.hora} — {fmt(p.total)} —{" "}
              <span style={{color:p.estado==="cancelado"?"#EF233C":"#06D6A0"}}>{p.estado}</span>
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════
    // ADMIN
    // ═══════════════════════════════════════
    function AdminView({ menu }) {
      return (
        <div style={S.rWrap}>
          <h3 style={{color:"#E85D04"}}>⚙️ Menú actual en Firebase</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {Object.entries(menu).map(([n,d])=>(
              <div key={n} style={{...S.mCard,borderTop:`4px solid ${d.color}`,minWidth:130,textAlign:"center"}}>
                <div style={{fontSize:26}}>{d.icon}</div>
                <div style={{fontWeight:700,fontSize:13}}>{n}</div>
                <div style={{fontSize:11,color:"#aaa"}}>{d.categoria}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════
    // ESTILOS
    // ═══════════════════════════════════════
    const S = {
      root:{ minHeight:"100vh",background:"#0F0F0F",color:"#F0EBE3" },
      toast:{ position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#06D6A0",color:"#0F0F0F",padding:"10px 22px",borderRadius:20,zIndex:9999,fontWeight:700,whiteSpace:"nowrap" },
      nav:{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:56,background:"#1A1A1A",borderBottom:"2px solid #E85D04",flexWrap:"wrap",gap:6 },
      brand:{ display:"flex",alignItems:"center",gap:8 },
      brandText:{ fontSize:18,fontWeight:800,color:"#E85D04" },
      online:{ fontSize:11,color:"#06D6A0",marginLeft:4 },
      navBtns:{ display:"flex",gap:4,flexWrap:"wrap" },
      navBtn:{ padding:"6px 10px",borderRadius:20,border:"1px solid #333",background:"transparent",color:"#aaa",fontSize:12,cursor:"pointer" },
      navBtnOn:{ background:"#E85D04",color:"#fff",border:"1px solid #E85D04" },
      main:{ padding:14 },
      centralDate:{ textAlign:"center",marginBottom:12,color:"#888",fontSize:13 },
      kanban:{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12 },
      kCol:{ background:"#1A1A1A",padding:10,borderRadius:10,minHeight:280 },
      kHead:{ fontWeight:800,marginBottom:10,textAlign:"center",paddingBottom:8,fontSize:13 },
