<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #0F0F0F; color: white; font-family: sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        // Importación simplificada de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmRE258LdtlR5jAo3ChN9jG94C3MsMI68",
            authDomain: "sistema-ventas-4ae00.firebaseapp.com",
            databaseURL: "https://sistema-ventas-4ae00-default-rtdb.firebaseio.com",
            projectId: "sistema-ventas-4ae00",
            storageBucket: "sistema-ventas-4ae00.firebasestorage.app",
            messagingSenderId: "774049154998",
            appId: "1:774049154998:web:6a5e9297dc52abf3cc2317"
        };

        const MENU_DEFAULT = {
            "Chilaquiles":  { icon:"🍳", color:"#E85D04", precio:55 },
            "Enchiladas":   { icon:"🌯", color:"#C1121F", precio:55 },
            "Tacos":        { icon:"🌮", color:"#F48C06", precio:28 },
            "Pambazos":     { icon:"🥙", color:"#DC2F02", precio:28 },
            "Quesadillas":  { icon:"🫓", color:"#9D4EDD", precio:30 },
            "Agua":         { icon:"💧", color:"#00B4D8", precio:25 },
            "Refresco":     { icon:"🥤", color:"#EF233C", precio:25 }
        };

        function App() {
            const [db, setDb] = React.useState(null);
            const [view, setView] = React.useState("pedido");
            const [pedidos, setPedidos] = React.useState({});
            const [carrito, setCarrito] = React.useState([]);
            const [mesa, setMesa] = React.useState("");

            React.useEffect(() => {
                try {
                    const app = initializeApp(firebaseConfig);
                    const database = getDatabase(app);
                    setDb(database);
                    // Escuchar pedidos en tiempo real
                    onValue(ref(database, "pedidos"), (snap) => {
                        setPedidos(snap.val() || {});
                    });
                } catch (error) {
                    console.error("Error conectando a Firebase:", error);
                }
            }, []);

            const enviarPedido = () => {
                if (!mesa) return alert("Por favor indica la mesa o nombre.");
                const total = carrito.reduce((s, i) => s + i.precio, 0);
                
                push(ref(db, "pedidos"), {
                    items: carrito,
                    mesa: mesa,
                    total: total,
                    estado: "pendiente",
                    hora: new Date().toLocaleTimeString(),
                    ts: Date.now()
                });

                setCarrito([]);
                setMesa("");
                alert("¡Pedido enviado!");
            };

            return (
                <div style={{ padding: "20px", maxWidth: "600px", margin: "0 auto" }}>
                    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                        <h1 style={{ color: "#E85D04", fontSize: "24px" }}>🌮 Mi Taquería</h1>
                        <div>
                            <button onClick={() => setView("pedido")} style={btnStyle(view === "pedido")}>Ventas</button>
                            <button onClick={() => setView("cocina")} style={btnStyle(view === "cocina")}>Cocina</button>
                        </div>
                    </header>

                    {view === "pedido" ? (
                        <div>
                            <input 
                                placeholder="Mesa / Cliente" 
                                value={mesa} 
                                onChange={(e) => setMesa(e.target.value)} 
                                style={inputStyle}
                            />
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                                {Object.entries(MENU_DEFAULT).map(([nombre, info]) => (
                                    <button 
                                        key={nombre} 
                                        onClick={() => setCarrito([...carrito, { nombre, precio: info.precio }])}
                                        style={cardStyle(info.color)}
                                    >
                                        <span style={{ fontSize: "24px" }}>{info.icon}</span><br/>
                                        <b>{nombre}</b><br/>
                                        ${info.precio}
                                    </button>
                                ))}
                            </div>
                            {carrito.length > 0 && (
                                <button onClick={enviarPedido} style={fabStyle}>
                                    🛒 Enviar Pedido (${carrito.reduce((s,i) => s + i.precio, 0)})
                                </button>
                            )}
                        </div>
                    ) : (
                        <div>
                            <h3>Pedidos Pendientes</h3>
                            {Object.entries(pedidos).reverse().map(([id, p]) => p.estado === "pendiente" && (
                                <div key={id} style={orderStyle}>
                                    <b>{p.mesa}</b> <small>{p.hora}</small>
                                    <ul style={{ paddingLeft: "15px", fontSize: "14px" }}>
                                        {p.items.map((it, idx) => <li key={idx}>{it.nombre}</li>)}
                                    </ul>
                                    <button 
                                        onClick={() => update(ref(db, `pedidos/${id}`), { estado: "listo" })}
                                        style={doneBtnStyle}
                                    >
                                        Marcar como Listo
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Estilos Rápidos
        const btnStyle = (active) => ({
            background: active ? "#E85D04" : "#333",
            color: "#fff", border: "none", padding: "8px 15px", borderRadius: "5px", marginLeft: "5px", cursor: "pointer"
        });
        const inputStyle = { width: "100%", padding: "12px", marginBottom: "15px", borderRadius: "8px", border: "1px solid #333", background: "#1A1A1A", color: "#fff", boxSizing: "border-box" };
        const cardStyle = (color) => ({
            background: "#1A1A1A", border: `1px solid ${color}`, color: "#fff", padding: "15px", borderRadius: "10px", cursor: "pointer"
        });
        const fabStyle = { position: "fixed", bottom: "20px", left: "50%", transform: "translateX(-50%)", background: "#E85D04", color: "#fff", padding: "15px 40px", borderRadius: "30px", border: "none", fontWeight: "bold", width: "80%", fontSize: "16px", boxShadow: "0 4px 10px rgba(0,0,0,0.5)" };
        const orderStyle = { background: "#1A1A1A", padding: "15px", borderRadius: "10px", marginBottom: "10px", border: "1px solid #333" };
        const doneBtnStyle = { background: "#06D6A0", border: "none", padding: "8px", width: "100%", borderRadius: "5px", fontWeight: "bold", marginTop: "10px", cursor: "pointer" };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
