const getTodayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const getToday = () => new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const fmt = n => `$${Number(n||0).toFixed(0)}`;
const getPrecio = (datos, variante) => {
  if (datos.precios && variante && datos.precios[variante] !== undefined) return datos.precios[variante];
  return datos.precio || 0;
};
const calcSubtotal = (precioBase, cantidad, extras=[], rellenos=[], nombreProducto="") => {
  const tieneExtraQueso = extras.some(e => e.includes("Extra Queso"));
  let cargoRellenos = 0;
  if (nombreProducto === "Chilaquiles") {
    // 1er relleno gratis, cada adicional cuesta $6
    cargoRellenos = Math.max(0, rellenos.length - 1) * PRECIO_RELLENO_CHILAQUILES;
  } else if (nombreProducto === "Gorditas") {
    // cada relleno cuesta $5
    cargoRellenos = rellenos.length * PRECIO_RELLENO_GORDITAS;
  }
  return (precioBase + (tieneExtraQueso ? PRECIO_EXTRA_QUESO : 0) + cargoRellenos) * cantidad;
};

// Obtener el siguiente ID consecutivo del día desde Firebase
const getSiguienteId = async () => {
  const hoy = getTodayKey();
  const counterRef = db.ref(`contadores/${hoy}`);
  const snap = await counterRef.once("value");
  const actual = snap.val() || 0;
  const siguiente = actual + 1;
  await counterRef.set(siguiente);
  return siguiente;
};

function exportarExcel(pedidos) {
  const hoy = getTodayKey();
  const pedidosHoy = pedidos.filter(p => p.fecha === hoy && p.estado !== "cancelado");
  const resumen = pedidosHoy.map(p => ({
    "ID": p.idDia ? `#${p.idDia}` : `#${String(p.ts||"").slice(-4)}`,
    "Mesa/Cliente": p.mesa || "Sin mesa",
    "Mesero": p.mesero || "",
    "Tipo": p.tipoServicio==="llevar"?"Para llevar":"En sitio",
    "Hora": p.hora || "",
    "Estado": p.estado || "",
    "Total ($)": p.total || 0,
  }));
  const detalle = [];
  pedidosHoy.forEach(p => {
    (p.items||[]).forEach(item => {
      detalle.push({
        "ID Pedido": p.idDia ? `#${p.idDia}` : `#${String(p.ts||"").slice(-4)}`,
        "Mesa/Cliente": p.mesa || "Sin mesa",
        "Hora": p.hora || "",
        "Producto": item.nombre || "",
        "Cantidad": item.cantidad || 1,
        "Subtotal ($)": item.subtotal || 0,
        "Entregado": item.entregado ? "Sí" : "No",
      });
    });
  });
  const totalDia = pedidosHoy.reduce((s,p)=>s+(p.total||0),0);
  const totales = [
    { "Concepto":"Total ventas del día", "Valor ($)":totalDia },
    { "Concepto":"Número de pedidos",    "Valor ($)":pedidosHoy.length },
    { "Concepto":"Ticket promedio",      "Valor ($)":pedidosHoy.length?Math.round(totalDia/pedidosHoy.length):0 },
    { "Concepto":"Pedidos cancelados",   "Valor ($)":pedidos.filter(p=>p.fecha===hoy&&p.estado==="cancelado").length },
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen), "Pedidos del Día");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detalle), "Detalle Productos");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(totales), "Resumen General");
  XLSX.writeFile(wb, `BenditoAntojo_${hoy}.xlsx`);
}

function LoginSistema({ onLogin }) {
  const [usuario, setUsuario] = useState("");
  const [pass,    setPass]    = useState("");
  const [error,   setError]   = useState("");
  const intentar = async () => {
    const key = usuario.toLowerCase().trim();
    // Check hardcoded users first
    const uHard = USUARIOS[key];
    if (uHard && uHard.pass === pass) { onLogin({ usuario: key, rol: uHard.rol }); return; }
    // Check Firebase users
    const snap = await db.ref(`usuarios/${key}`).once("value");
    const uFb  = snap.val();
    if (uFb && uFb.pass === pass) { onLogin({ usuario: key, rol: uFb.rol }); return; }
    setError("Usuario o contraseña incorrectos"); setTimeout(()=>setError(""),2500);
  };
  return (
    <div style={{minHeight:"100vh",background:"#0F0F0F",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1A1A1A",borderRadius:20,padding:36,width:"100%",maxWidth:340,border:"1px solid #333",textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:8}}>🌮</div>
        <h2 style={{color:"#E85D04",margin:"0 0 4px",fontSize:22}}>Bendito Antojo</h2>
        <p style={{color:"#666",fontSize:13,margin:"0 0 24px"}}>Sistema de Ventas</p>
        <input style={{...SL.input,marginBottom:10}} placeholder="Usuario" value={usuario}
          onChange={e=>setUsuario(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()}/>
        <input type="password" style={{...SL.input,marginBottom:error?8:16}} placeholder="Contraseña" value={pass}
          onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&intentar()}/>
        {error && <div style={{color:"#EF233C",fontSize:13,marginBottom:12}}>❌ {error}</div>}
        <button style={SL.btn} onClick={intentar}>Entrar →</button>
        <p style={{color:"#444",fontSize:11,marginTop:16,marginBottom:0}}>Contacta al administrador si no tienes acceso</p>
      </div>
    </div>
  );
}

function ModalProducto({ producto, nombre, onConfirmar, onCerrar }) {
  const d = producto;
  const [variante,  setVariante]  = useState(d.variantes?.[0] || null);
  // Chilaquiles (multiRelleno) permite selección múltiple de rellenos
  const [rellenos,  setRellenos]  = useState(d.rellenos ? [d.rellenos[0]] : []);
  const [sabor,     setSabor]     = useState(d.sabores?.[0] || null);
  const [extras,    setExtras]    = useState([]);
  const [cantidad,  setCantidad]  = useState(1);
  const [nota,      setNota]      = useState("");

  const toggleExtra  = ex => setExtras(prev => prev.includes(ex) ? prev.filter(e=>e!==ex) : [...prev,ex]);
  const toggleRellen = r  => {
    if (d.multiRelleno) {
      setRellenos(prev => prev.includes(r) ? prev.filter(x=>x!==r) : [...prev,r]);
    } else {
      setRellenos([r]);
    }
  };

  const precioBase = getPrecio(d, variante);
  const subtotal   = calcSubtotal(precioBase, cantidad, extras, rellenos, nombre);
  // Cargo extra por rellenos para mostrarlo al usuario
  const cargoRellenosExtra = nombre === "Chilaquiles"
    ? Math.max(0, rellenos.length - 1) * PRECIO_RELLENO_CHILAQUILES
    : nombre === "Gorditas"
    ? rellenos.length * PRECIO_RELLENO_GORDITAS
    : 0;
  const partes     = [
    variante,
    rellenos.length ? rellenos.join(" + ") : null,
    sabor,
    extras.length ? extras.join(", ") : null,
    nota||null
  ].filter(Boolean);
  const descripcion = `${nombre}${partes.length ? ` (${partes.join(" | ")})` : ""}`;

  return (
    <div style={M.overlay} onClick={e=>{ if(e.target===e.currentTarget) onCerrar(); }}>
      <div style={M.box}>
        <div style={M.header}>
          <span style={{fontSize:32}}>{d.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:17,color:"#F0EBE3"}}>{nombre}</div>
            <div style={{fontSize:13,color:"#E85D04",fontWeight:700}}>
              {fmt(precioBase)}{d.unidad?` ${d.unidad}`:""}
              {extras.some(e=>e.includes("Extra Queso")) && <span style={{color:"#FFBA08"}}> +$5 queso</span>}
              {cargoRellenosExtra > 0 && <span style={{color:"#F4A261"}}> +${cargoRellenosExtra} rellenos</span>}
            </div>
          </div>
          <button style={M.closeBtn} onClick={onCerrar}>✕</button>
        </div>
        <div style={M.body}>
          {d.variantes?.length > 0 && (
            <div style={M.section}>
              <div style={M.sectionTitle}>{d.categoria==="bebida"?"🥤 Presentación":"🍽️ Tipo"}</div>
              <div style={M.chipRow}>
                {d.variantes.map(v=>(
                  <button key={v} style={{...M.chip,...(variante===v?M.chipOn:{})}} onClick={()=>setVariante(v)}>
                    {v}{d.precios?.[v]?` · ${fmt(d.precios[v])}`:""}
                  </button>
                ))}
              </div>
            </div>
          )}
          {d.rellenos && (
            <div style={M.section}>
              <div style={M.sectionTitle}>
                🥩 Relleno
                {nombre==="Chilaquiles" && <span style={{fontSize:11,color:"#F4A261",fontWeight:500,marginLeft:6}}>(1ro gratis · +$6 c/u adicional)</span>}
                {nombre==="Gorditas"    && <span style={{fontSize:11,color:"#F4A261",fontWeight:500,marginLeft:6}}>(+$5 por relleno)</span>}
              </div>
              <div style={M.chipRow}>
                {d.rellenos.map(r=>(
                  <button key={r} style={{...M.chip,...(rellenos.includes(r)?M.chipOn:{})}} onClick={()=>toggleRellen(r)}>{r}</button>
                ))}
              </div>
            </div>
          )}
          {d.sabores && (
            <div style={M.section}>
              <div style={M.sectionTitle}>🍓 Sabor</div>
              <div style={M.chipRow}>
                {d.sabores.map(s=>(
                  <button key={s} style={{...M.chip,...(sabor===s?M.chipOn:{})}} onClick={()=>setSabor(s)}>{s}</button>
                ))}
              </div>
            </div>
          )}
          {d.extras && (
            <div style={M.section}>
              <div style={M.sectionTitle}>➕ Extras <span style={{fontSize:11,color:"#888",fontWeight:400}}>(selección múltiple)</span></div>
              <div style={M.chipRow}>
                {d.extras.map(ex=>(
                  <button key={ex}
                    style={{...M.chip,...(extras.includes(ex)?M.chipOn:{}),...(ex.includes("Extra Queso")?{borderColor:"#FFBA08"}:{})}}
                    onClick={()=>toggleExtra(ex)}>{ex}</button>
                ))}
              </div>
            </div>
          )}
          <div style={M.section}>
            <div style={M.sectionTitle}>📝 Nota especial <span style={{fontSize:11,color:"#888",fontWeight:400}}>(opcional)</span></div>
            <input style={M.notaInput} placeholder="Ej: sin cebolla, extra picoso…" value={nota} onChange={e=>setNota(e.target.value)}/>
          </div>
          <div style={M.section}>
            <div style={M.sectionTitle}>🔢 Cantidad</div>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <button style={M.qBtn} onClick={()=>setCantidad(c=>Math.max(1,c-1))}>−</button>
              <span style={{fontSize:22,fontWeight:800,minWidth:30,textAlign:"center"}}>{cantidad}</span>
              <button style={M.qBtn} onClick={()=>setCantidad(c=>c+1)}>+</button>
              <span style={{marginLeft:"auto",fontSize:18,fontWeight:800,color:"#E85D04"}}>{fmt(subtotal)}</span>
            </div>
          </div>
        </div>
        <div style={M.footer}>
          <div style={{fontSize:12,color:"#666",marginBottom:8,lineHeight:1.5}}>{descripcion}</div>
          <button style={M.confirmBtn} onClick={()=>onConfirmar({nombre:descripcion,cantidad,subtotal,icon:d.icon,entregado:false,esNuevo:false})}>
            ✅ Agregar al pedido · {fmt(subtotal)}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [sesion,  setSesion]  = useState(()=>{
    try { const s = localStorage.getItem("ba_sesion"); return s ? JSON.parse(s) : null; } catch { return null; }
  });
  const [view,    setView]    = useState("central");
  const [pedidos, setPedidos] = useState({});
  const [menu,    setMenu]    = useState(MENU_DEFAULT);
  const [notif,   setNotif]   = useState(null);
  const [fbReady, setFbReady] = useState(false);

  useEffect(() => {
    db.ref("pedidos").on("value", snap => setPedidos(snap.val() || {}));
    db.ref("menu").on("value", snap => {
      const val = snap.val();
      if (val) setMenu(val); else db.ref("menu").set(MENU_DEFAULT);
    });
    setFbReady(true);
  }, []);

  const showNotif = msg => { setNotif(msg); setTimeout(()=>setNotif(null),2800); };

  // Orden fijo del ticket: comidas primero (orden específico), bebidas al final
  const ORDEN_COMIDA = ["Quesadillas","Pambazos","Gorditas","Enchiladas","Tacos","Huaraches","Chilaquiles","Pan de Dulce","Pan Blanco"];
  const ordenarItems = (items, menuActual) => {
    const getPrioridad = item => {
      const nombreBase = item.nombre.split(" (")[0].trim();
      const idxComida  = ORDEN_COMIDA.indexOf(nombreBase);
      const esComida   = menuActual[nombreBase] && menuActual[nombreBase].categoria === "comida";
      if (idxComida >= 0) return idxComida;
      if (esComida) return 900;
      return 1000; // bebidas al final
    };
    return [...items].sort((a,b) => getPrioridad(a) - getPrioridad(b));
  };

  const addPedido = useCallback(async pedido => {
    const idDia = await getSiguienteId();
    db.ref("pedidos").push({
      ...pedido,
      items: ordenarItems(pedido.items || [], menu),
      idDia,
      fecha: getTodayKey(),
      hora: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
      estado: "pendiente",
      ts: Date.now()
    });
    showNotif(`✅ Pedido #${idDia} enviado a cocina`);
  }, [menu]);

  // Al agregar items: los existentes conservan su estado, nuevos se marcan esNuevo:true
  // Si los nuevos son SOLO bebidas → el pedido NO cambia de estado (se queda donde estaba)
  // Si hay aunque sea UN platillo de comida → el pedido vuelve a pendientes para que cocina lo vea
  const agregarAlPedido = useCallback((id, pedidoActual, itemsNuevos) => {
    const estabaEntregado = pedidoActual.estado === "entregado" || pedidoActual.estado === "cobrado";
    const itemsViejos = (pedidoActual.items||[]).map(i=>({
      ...i,
      esNuevo: false,
      entregado: estabaEntregado ? true : i.entregado
    }));
    // Las bebidas se marcan esNuevo:false (ya listas, no van a cocina)
    // La comida se marca esNuevo:true (necesita preparación)
    const hayComida = itemsNuevos.some(i => {
      const nombreBase = (i.nombre||"").split(" (")[0].trim();
      const datosMenu  = menu[nombreBase];
      return datosMenu ? datosMenu.categoria === "comida" : true; // si no está en menú, asumir comida
    });
    const itemsMarcados = itemsNuevos.map(i => {
      const nombreBase = (i.nombre||"").split(" (")[0].trim();
      const datosMenu  = menu[nombreBase];
      const esBebida   = datosMenu ? datosMenu.categoria === "bebida" : false;
      return { ...i, entregado: false, esNuevo: !esBebida }; // bebidas no van a cocina
    });
    const items = [...itemsViejos, ...itemsMarcados];
    const total = items.reduce((s,i)=>s+(i.subtotal||0),0);
    const nuevoEstado = hayComida ? "pendiente" : pedidoActual.estado;
    const update = { items, total, estado: nuevoEstado,
      actualizado: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}) };
    if (hayComida) update.ts = Date.now(); // encolar al final solo si hay comida
    db.ref(`pedidos/${id}`).update(update);
    const msg = hayComida
      ? "✅ Productos añadidos — comida encolada en pendientes"
      : "✅ Bebidas añadidas — pedido se queda en su lugar";
    showNotif(msg);
  }, [menu]);

  const marcarItemEntregado = useCallback((id, pedidoActual, itemIdx) => {
    const items = (pedidoActual.items||[]).map((it,i)=> i===itemIdx ? {...it,entregado:true,esNuevo:false} : it);
    db.ref(`pedidos/${id}`).update({ items });
    showNotif("✓ Producto marcado como entregado");
  }, []);

  const updateEstado = (id, estado) => db.ref(`pedidos/${id}`).update({ estado });
  // Cancelar: se llama desde el modal de doble check
  const cancelar = id => db.ref(`pedidos/${id}`).update({ estado:"cancelado" });
  const editarPedido = useCallback((id, nuevosItems) => {
    const total = nuevosItems.reduce((s,i)=>s+(i.subtotal||0),0);
    db.ref(`pedidos/${id}`).update({ items: nuevosItems, total,
      actualizado: new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}) });
    showNotif("✅ Pedido actualizado");
  }, []);
  const updateMenu = nuevoMenu => { db.ref("menu").set(nuevoMenu); showNotif("✅ Menú actualizado"); };

  const pedidosArr = Object.entries(pedidos)
    .map(([id,p])=>({...p,id}))
    // Orden: más reciente arriba (mayor ts = número más grande = agregado después)
    // PERO queremos que el PRIMERO llegado quede ARRIBA → orden ASCENDENTE por ts
    .sort((a,b)=>(a.ts||0)-(b.ts||0));
  const hoy = pedidosArr.filter(p=>p.fecha===getTodayKey());
  const esAdmin = sesion?.rol === "admin";

  const handleLogin = (s) => { setSesion(s); try { localStorage.setItem("ba_sesion", JSON.stringify(s)); } catch {} };
  const handleLogout = () => { setSesion(null); try { localStorage.removeItem("ba_sesion"); } catch {} };
  if (!sesion) return <LoginSistema onLogin={handleLogin}/>;

  const esTablero = sesion?.rol === "tablero";
  const esMesero  = sesion?.rol === "mesero";
  const navItems = [
    {k:"central", l:"📺 Central"},
    {k:"pedido",  l:"📱 Pedido",   ocultarSi: esTablero},
    {k:"reportes",l:"📊 Reportes", soloAdmin:true},
    {k:"admin",   l:"⚙️ Admin",    soloAdmin:true},
  ];

  return (
    <div style={S.root}>
      {notif && <div style={S.toast}>{notif}</div>}
      <nav style={S.nav}>
        <div style={S.brand}>
          <span style={{fontSize:22}}>🌮</span>
          <span style={S.brandText}>Bendito Antojo</span>
        </div>
        <div style={S.navBtns}>
          {navItems.filter(v=>(!v.soloAdmin||esAdmin) && !v.ocultarSi).map(v=>(
            <button key={v.k} style={{...S.navBtn,...(view===v.k?S.navBtnOn:{})}} onClick={()=>setView(v.k)}>{v.l}</button>
          ))}
          <button style={{...S.navBtn,color:"#EF233C",borderColor:"#EF233C"}} onClick={handleLogout}>🚪</button>
        </div>
      </nav>
      <main style={S.main}>
        {view==="central"  && <Central pedidos={hoy} onUpdate={updateEstado} onCancelar={cancelar} onAgregarAl={agregarAlPedido} onMarcarItem={marcarItemEntregado} onEditarPedido={editarPedido} menu={menu} sesion={sesion}/>}
        {view==="pedido"   && !esTablero && <Pedido  onAdd={addPedido} menu={menu} sesion={sesion}/>}
        {esTablero && view!=="central" && <div style={{padding:40,textAlign:"center",color:"#555"}}>Vista no disponible para tablero.</div>}
        {view==="reportes" && esAdmin && <Reportes pedidos={pedidosArr}/>}
        {view==="admin"    && esAdmin && <AdminView menu={menu} onUpdate={updateMenu}/>}
      </main>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// CENTRAL — kanban con 5 columnas
// ══════════════════════════════════════════════════════
function Central({ pedidos, onUpdate, onCancelar, onAgregarAl, onMarcarItem, onEditarPedido, menu, sesion }) {
  const [pedidoSelec,     setPedidoSelec]     = useState(null);
  const [productoModal,   setProductoModal]   = useState(null);
  const [carritoExtra,    setCarritoExtra]    = useState([]);

  const [expandidos,      setExpandidos]      = useState({}); // {pedidoId: true/false}
  const [modalCobro,      setModalCobro]      = useState(null); // {pedido, billete, cambio}
  const [modalEditar,     setModalEditar]     = useState(null); // {pedido, items}
  const [confirmEliminar, setConfirmEliminar] = useState(null); // {pedidoId, items, itemIdx, paso}
  const toggleExpandir = id => setExpandidos(prev => ({...prev, [id]: !prev[id]}));

  const cols = [
    { k:"pendiente",  l:"⏳ Pendientes", c:"#FFBA08", acc:[{l:"▶ Preparar",e:"en_proceso",c:"#3A86FF"}] },

    { k:"entregado",  l:"🤝 Entregados",  c:"#888",    acc:[{l:"💰 Cobrado", e:"cobrado",  c:"#1D6F42"}] },
    { k:"cobrado",    l:"💰 Cobrados",    c:"#1D6F42", acc:[] },
  ];

  const confirmarExtra = item => { setCarritoExtra(prev=>[...prev,item]); setProductoModal(null); };
  const confirmarAgregarAl = () => {
    if (!pedidoSelec || carritoExtra.length===0) return;
    onAgregarAl(pedidoSelec.id, pedidoSelec, carritoExtra);
    setPedidoSelec(null); setCarritoExtra([]);
  };

  return (
    <div>
      <div style={S.centralDate}>📅 {getToday()}</div>

      {/* Modal cobro con cambio */}
      {modalCobro && (()=>{
        const total = modalCobro.pedido.total || 0;
        const billete = parseFloat(modalCobro.billete) || 0;
        const cambio = billete >= total ? billete - total : null;
        const billetesPredefinidos = [50,100,200,500,1000].filter(b=>b>=total);
        return (
          <div style={M.overlay} onClick={e=>{ if(e.target===e.currentTarget) setModalCobro(null); }}>
            <div style={{...M.box,maxHeight:"85vh"}}>
              <div style={M.header}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:17,color:"#1D6F42"}}>💰 Cobrar pedido</div>
                  <div style={{fontSize:13,color:"#aaa"}}>
                    #{modalCobro.pedido.idDia||String(modalCobro.pedido.ts||"").slice(-4)} — {modalCobro.pedido.mesa||"Sin mesa"}
                  </div>
                </div>
                <button style={M.closeBtn} onClick={()=>setModalCobro(null)}>✕</button>
              </div>
              <div style={M.body}>
                {/* Total a cobrar */}
                <div style={{textAlign:"center",marginBottom:20,padding:"16px 0",background:"#111",borderRadius:12,border:"1px solid #1D6F42"}}>
                  <div style={{color:"#aaa",fontSize:13,marginBottom:4}}>Total a cobrar</div>
                  <div style={{fontSize:36,fontWeight:900,color:"#1D6F42"}}>{fmt(total)}</div>
                </div>

                {/* Billetes rápidos */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:"#888",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.4px"}}>Billetes rápidos</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {billetesPredefinidos.map(b=>(
                      <button key={b}
                        style={{padding:"8px 16px",borderRadius:10,border:`2px solid ${parseFloat(modalCobro.billete)===b?"#E85D04":"#444"}`,
                          background:parseFloat(modalCobro.billete)===b?"#E85D04":"#242424",
                          color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}
                        onClick={()=>setModalCobro(prev=>({...prev,billete:String(b)}))}>
                        ${b}
                      </button>

                  </div>
                </div>

                {/* Input manual */}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:"#888",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.4px"}}>O escribe la cantidad recibida</div>
                  <input
                    type="number"
                    placeholder="Ej: 150"
                    value={modalCobro.billete}
                    onChange={e=>setModalCobro(prev=>({...prev,billete:e.target.value}))}
                    style={{width:"100%",background:"#111",border:"1px solid #444",color:"#fff",borderRadius:8,padding:"12px 14px",fontSize:18,fontWeight:700}}
                  />
                </div>

                {/* Cambio */}
                {modalCobro.billete !== "" && (
                  <div style={{textAlign:"center",padding:"14px 0",borderRadius:12,
                    background: cambio !== null ? "rgba(6,214,160,0.1)" : "rgba(239,35,60,0.1)",
                    border: `1px solid ${cambio !== null ? "#06D6A0" : "#EF233C"}`,marginBottom:4}}>
                    {cambio !== null ? (
                      <>
                        <div style={{color:"#aaa",fontSize:12,marginBottom:4}}>Cambio a devolver</div>
                        <div style={{fontSize:40,fontWeight:900,color:"#06D6A0"}}>{fmt(cambio)}</div>
                      </>
                    ) : (
                      <>
                        <div style={{color:"#EF233C",fontSize:14,fontWeight:700}}>⚠️ El billete no alcanza</div>
                        <div style={{color:"#aaa",fontSize:12,marginTop:4}}>Faltan {fmt(total - billete)}</div>
                      </>
                    )}
                  </div>
                )}
              </div>
              <div style={M.footer}>
                <div style={{display:"flex",gap:10}}>
                  <button
                    style={{flex:1,padding:"13px 0",borderRadius:12,border:"2px solid #444",background:"#2a2a2a",color:"#ccc",fontWeight:700,fontSize:14,cursor:"pointer"}}
                    onClick={()=>setModalCobro(null)}>
                    ✕ Cancelar
                  </button>
                  <button
                    style={{flex:2,padding:"13px 0",borderRadius:12,border:"none",
                      background: cambio !== null || modalCobro.billete==="" ? "#1D6F42" : "#555",
                      color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",
                      opacity: (cambio===null && modalCobro.billete!=="") ? 0.5 : 1}}
                    disabled={cambio===null && modalCobro.billete!==""}
                    onClick={()=>{ onUpdate(modalCobro.pedido.id,"cobrado"); setModalCobro(null); }}>
                    ✅ Confirmar cobro
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Modal Editar Pedido */}
      {modalEditar && (
        <div style={{...M.overlay,zIndex:2000}} onClick={e=>{ if(e.target===e.currentTarget) setModalEditar(null); }}>
          <div style={{...M.box,maxHeight:"88vh"}}>
            <div style={M.header}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:17,color:"#3A86FF"}}>✏️ Editar pedido</div>
                <div style={{fontSize:13,color:"#aaa"}}>#{modalEditar.pedido.idDia||String(modalEditar.pedido.ts||"").slice(-4)} — {modalEditar.pedido.mesa||"Sin mesa"}</div>

              <button style={M.closeBtn} onClick={()=>setModalEditar(null)}>✕</button>
            </div>
            <div style={M.body}>
              {modalEditar.items.map((item, idx)=>{
                const partes = item.nombre.includes("(")
                  ? item.nombre.slice(item.nombre.indexOf("(")+1, item.nombre.lastIndexOf(")")).split("|").map(s=>s.trim())
                  : [];
                const nombreBase = item.nombre.split(" (")[0].trim();
                const lineaPrincipal = [nombreBase, ...(partes.length?[partes.join(" | ")]:[])]
                  .filter(Boolean).join(" ");
                return (
                  <div key={idx} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #222"}}>
                    <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>

                      <div style={{fontSize:14,fontWeight:600,color:"#F0EBE3",lineHeight:1.3}}>{lineaPrincipal}</div>

                    {/* Cantidad */}

                      <button style={{...M.qBtn,width:28,height:28,fontSize:16}}
                        onClick={()=>{
                          if (item.cantidad <= 1) return;
                          setModalEditar(prev=>({...prev, items: prev.items.map((it,i)=> i===idx
                            ? {...it, cantidad: it.cantidad-1, subtotal: Math.round(it.subtotal/it.cantidad*(it.cantidad-1)) }
                            : it
                          )}));
                        }}>−</button>
                      <span style={{fontWeight:800,fontSize:15,color:"#E85D04",minWidth:20,textAlign:"center"}}>{item.cantidad}</span>
                      <button style={{...M.qBtn,width:28,height:28,fontSize:16}}
                        onClick={()=>{
                          setModalEditar(prev=>({...prev, items: prev.items.map((it,i)=> i===idx
                            ? {...it, cantidad: it.cantidad+1, subtotal: Math.round(it.subtotal/it.cantidad*(it.cantidad+1)) }
                            : it
                          )}));
                        }}>+</button>

                    {/* Eliminar con doble factor */}

              {modalEditar.items.length === 0 && (
                <div style={{color:"#555",textAlign:"center",padding:20,fontSize:14}}>No hay productos en este pedido.</div>

            </div>
            <div style={M.footer}>
              <div style={{textAlign:"right",fontWeight:800,fontSize:16,color:"#E85D04",marginBottom:10}}>
                Total: {fmt(modalEditar.items.reduce((s,i)=>s+(i.subtotal||0),0))}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button style={{flex:1,padding:"12px 0",border:"2px solid #444",borderRadius:12,background:"#2a2a2a",color:"#ccc",fontWeight:700,cursor:"pointer"}}

                <button style={{flex:2,padding:"12px 0",border:"none",borderRadius:12,background:"#3A86FF",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}
                  onClick={()=>{ onEditarPedido(modalEditar.pedido.id, modalEditar.items); setModalEditar(null); }}>

                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Doble confirmación eliminar item */}
      {confirmEliminar && (
        <div style={{...M.overlay,zIndex:3000}}>
          <div style={{...M.box,maxHeight:"auto",borderRadius:16,margin:20}}>
            <div style={{padding:24,textAlign:"center"}}>
              {confirmEliminar.paso === 1 ? (
                <>
                  <div style={{fontSize:44,marginBottom:10}}>⚠️</div>
                  <div style={{fontWeight:800,fontSize:17,color:"#F0EBE3",marginBottom:8}}>¿Eliminar este producto?</div>
                  <div style={{color:"#aaa",fontSize:13,marginBottom:20}}>
                    {confirmEliminar.items[confirmEliminar.itemIdx]?.nombre?.split(" (")[0]}<br/>
                    <span style={{color:"#EF233C",fontSize:12}}>Paso 1 de 2 — confirma la eliminación</span>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button style={{flex:1,padding:"12px 0",border:"none",borderRadius:10,background:"#333",color:"#ccc",fontWeight:700,cursor:"pointer"}}
                      onClick={()=>setConfirmEliminar(null)}>No, conservar</button>
                    <button style={{flex:1,padding:"12px 0",border:"none",borderRadius:10,background:"#EF233C",color:"#fff",fontWeight:800,cursor:"pointer"}}
                      onClick={()=>setConfirmEliminar(prev=>({...prev,paso:2}))}>Sí, continuar</button>
                  </div>
                </>
              ) : (
                <>
                  <div style={{fontSize:44,marginBottom:10}}>🗑️</div>
                  <div style={{fontWeight:800,fontSize:17,color:"#EF233C",marginBottom:8}}>Confirmación final</div>
                  <div style={{color:"#aaa",fontSize:13,marginBottom:20}}>
                    ¿Estás seguro de eliminar este producto?<br/>
                    <span style={{color:"#EF233C",fontSize:12}}>Esta acción no se puede deshacer.</span>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button style={{flex:1,padding:"12px 0",border:"none",borderRadius:10,background:"#333",color:"#ccc",fontWeight:700,cursor:"pointer"}}
                      onClick={()=>setConfirmEliminar(null)}>Cancelar</button>
                    <button style={{flex:1,padding:"12px 0",border:"none",borderRadius:10,background:"#EF233C",color:"#fff",fontWeight:800,cursor:"pointer"}}
                      onClick={()=>{
                        const nuevosItems = confirmEliminar.items.filter((_,i)=>i!==confirmEliminar.itemIdx);
                        setModalEditar(prev=>({...prev, items: nuevosItems}));
                        setConfirmEliminar(null);
                      }}>🗑️ Eliminar definitivo</button>
                  </div>
                </>

          </div>

      {pedidoCancelar && (
        <ModalConfirmarCancelar
          pedido={pedidoCancelar}

        />

      {pedidoSelec && !productoModal && (
        <div style={M.overlay} onClick={e=>{ if(e.target===e.currentTarget){ setPedidoSelec(null); setCarritoExtra([]); }}}>
          <div style={M.box}>
            <div style={M.header}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16,color:"#E85D04"}}>➕ Agregar productos</div>
                <div style={{fontSize:13,color:"#aaa"}}>
                  Pedido #{pedidoSelec.idDia||String(pedidoSelec.ts).slice(-4)} — {pedidoSelec.mesa||"Sin mesa"}
                </div>
              </div>
              <button style={M.closeBtn} onClick={()=>{ setPedidoSelec(null); setCarritoExtra([]); }}>✕</button>
            </div>
            <div style={{...M.body,maxHeight:"52vh",overflowY:"auto"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8}}>
                {Object.entries(menu).map(([nombre,datos])=>(
                  <button key={nombre}
                    style={{background:"#242424",border:`2px solid ${datos.color}`,borderRadius:10,padding:"10px 6px",color:"#fff",cursor:"pointer",textAlign:"center"}}
                    onClick={()=>setProductoModal({nombre,datos})}>
                    <div style={{fontSize:22}}>{datos.icon}</div>
                    <div style={{fontSize:12,fontWeight:700,marginTop:3}}>{nombre}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{fmt(getPrecio(datos,datos.variantes?.[0]))}</div>
                  </button>
                ))}
              </div>
              {carritoExtra.length > 0 && (
                <div style={{marginTop:12,background:"#111",padding:10,borderRadius:8}}>
                  <div style={{fontWeight:700,marginBottom:6,color:"#E85D04"}}>Por agregar:</div>
                  {carritoExtra.map((i,idx)=>(
                    <div key={idx} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"2px 0",color:"#ccc"}}>
                      <span>{i.icon} {i.nombre}</span><span>{fmt(i.subtotal)}</span>
                    </div>
                  ))}
                  <div style={{borderTop:"1px solid #333",marginTop:6,paddingTop:6,fontWeight:800,color:"#E85D04",textAlign:"right"}}>
                    Extra: {fmt(carritoExtra.reduce((s,i)=>s+i.subtotal,0))}
                  </div>
                </div>
              )}
            </div>
            <div style={M.footer}>
              <button style={{...M.confirmBtn,opacity:carritoExtra.length===0?0.4:1}}
                disabled={carritoExtra.length===0} onClick={confirmarAgregarAl}>
                ✅ Confirmar y enviar a cocina
              </button>
            </div>
          </div>
        </div>
      )}

      {productoModal && (
        <ModalProducto nombre={productoModal.nombre} producto={productoModal.datos}
          onConfirmar={confirmarExtra} onCerrar={()=>setProductoModal(null)}/>
      )}

      <div style={S.kanban}>
        {cols.map(col=>(
          <div key={col.k} style={S.kCol}>
            <div style={{...S.kHead,borderBottom:`3px solid ${col.c}`,color:col.c}}>{col.l}</div>
            {pedidos.filter(p=>p.estado===col.k && (sesion?.rol!=="mesero" || p.mesero===sesion?.usuario)).map(p=>{
              const esCobrado = col.k==="cobrado";
              const itemsOriginales = (p.items||[]).filter(i=>!i.esNuevo);
              const itemsNuevos     = (p.items||[]).filter(i=>i.esNuevo);
              const hayNuevos       = itemsNuevos.length > 0;

              return (
                <div key={p.id} style={{...S.card,...(p.actualizado&&!esCobrado?{border:"2px solid #E85D04"}:{})}}>
                  <div style={S.cardTop}>
                    <span style={{fontWeight:800,fontSize:16}}>#{p.idDia || String(p.ts||"").slice(-4)}</span>
                    <span style={{fontSize:15}}> — {p.mesa||"Sin mesa"}</span><br/>
                    <span style={{color:"#aaa",fontSize:14}}>{p.hora}{p.actualizado?` · act. ${p.actualizado}`:""} · {fmt(p.total)}</span><br/>
                    {p.mesero && <span style={{color:"#9D4EDD",fontSize:14}}>👤 {p.mesero}{p.tipoServicio ? ` · ${p.tipoServicio==="llevar"?"🥡 Para llevar":"🍽️ En sitio"}` : ""}</span>}
                  </div>

                  <div style={S.itemsList}>
                    {(()=>{
                      // En entregado/cobrado: vista limpia sin tachados ni botones
                      const esVistaLimpia = col.k==="entregado" || col.k==="cobrado";
                      const todosItems = (p.items||[]);

                      const renderItem = (item, i, esNuevoItem) => {
                        const partes = item.nombre.includes("(")
                          ? item.nombre.slice(item.nombre.indexOf("(")+1, item.nombre.lastIndexOf(")")).split("|").map(s=>s.trim())
                          : [];
                        const nombreBase     = item.nombre.split(" (")[0].trim();
                        const tipo           = partes[0] || null;
                        const extraQueso     = partes.find(p=>p.includes("Extra Queso")) || null;
                        const complementos   = partes.filter(p=>p!==tipo && !p.includes("Extra Queso")).join(", ");
                        const lineaPrincipal = [nombreBase, tipo, extraQueso, complementos||null].filter(Boolean).join(" | ");

                        if (esVistaLimpia) {
                          // Vista limpia: sin tachado, sin botones, todo visible
                          return (
                            <div key={i} style={{padding:"5px 0",borderBottom:"1px solid #222"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>
                                <span style={{fontWeight:900,fontSize:16,color:"#E85D04",flexShrink:0}}>×{item.cantidad}</span>
                                <span style={{fontWeight:600,fontSize:15,color:"#F0EBE3",flex:1,lineHeight:1.4}}>{lineaPrincipal}</span>
                              </div>
                            </div>
                          );
                        }

                        // Vista normal (pendiente / en_proceso): tachado + botones
                        if (esNuevoItem) {
                          return (
                            <div key={i} style={{padding:"5px 6px",borderBottom:"1px solid #2a2a2a",borderRadius:4,
                              background:"rgba(255,186,8,0.06)",animation:"pulseNew 2s ease-in-out infinite",
                              opacity:item.entregado?0.4:1,textDecoration:item.entregado?"line-through":"none"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>
                                <span style={{fontWeight:900,fontSize:16,color:"#FFBA08",flexShrink:0}}>×{item.cantidad}</span>
                                <span style={{fontWeight:600,fontSize:15,color:item.entregado?"#555":"#F0EBE3",flex:1,lineHeight:1.4}}>{lineaPrincipal}</span>
                              </div>
                            </div>
                          );
                        }
                        return (
                          <div key={i} style={{padding:"5px 0",borderBottom:"1px solid #222",
                            opacity:item.entregado?0.4:1,textDecoration:item.entregado?"line-through":"none"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>
                              <span style={{fontWeight:900,fontSize:16,color:item.entregado?"#555":"#E85D04",flexShrink:0}}>×{item.cantidad}</span>
                              <span style={{fontWeight:600,fontSize:15,color:item.entregado?"#555":"#F0EBE3",flex:1,lineHeight:1.4}}>{lineaPrincipal}</span>
                              {col.k==="entregado" && !item.entregado && (
                                <button style={S.checkBtn} onClick={()=>onMarcarItem(p.id,p,todosItems.indexOf(item))}>✓</button>
                              )}
                            </div>
                          </div>
                        );
                      };

                      if (esVistaLimpia) {
                        // En entregado/cobrado: colapsado por defecto, expandir con botón
                        const expandido = expandidos[p.id];
                        return (
                          <>
                            <button
                              style={{width:"100%",padding:"5px 0",background:"transparent",
                                border:"1px dashed #444",borderRadius:6,color:"#aaa",fontSize:12,
                                cursor:"pointer",fontWeight:600,marginBottom:expandido?6:0}}
                              onClick={()=>toggleExpandir(p.id)}>
                              {expandido
                                ? "▲ Ocultar pedido"
                                : `▼ Ver pedido completo (${todosItems.length} producto${todosItems.length!==1?"s":""})`}
                            </button>
                            {expandido && todosItems.map((item,i) => renderItem(item, i, false))}
                          </>
                        );
                      }

                      // Vista normal con nuevos: mostrar TODOS los no entregados (para cocina)
                      if (hayNuevos) {
                        const expandido = expandidos[p.id];
                        const itemsPendientesPreparar = todosItems.filter(it => !it.entregado);
                        return (
                          <>
                            {/* Todos los pendientes de preparar */}
                            <div style={{fontSize:10,color:"#FFBA08",fontWeight:800,padding:"2px 0",letterSpacing:"0.4px"}}>
                              🍳 PENDIENTES DE PREPARAR ({itemsPendientesPreparar.length})
                            </div>
                            {itemsPendientesPreparar.map((item,i) => renderItem(item, i, item.esNuevo))}

                            {/* Botón para ver ya preparados */}
                            {itemsOriginales.filter(it=>it.entregado).length > 0 && (
                              <button
                                style={{width:"100%",marginTop:6,padding:"4px 0",background:"transparent",
                                  border:"1px dashed #444",borderRadius:6,color:"#888",fontSize:11,
                                  cursor:"pointer",fontWeight:600}}
                                onClick={()=>toggleExpandir(p.id)}>
                                {expandido ? "▲ Ocultar ya preparados" : `▼ Ver ya preparados (${itemsOriginales.filter(it=>it.entregado).length})`}
                              </button>
                            )}
                            {expandido && (
                              <>
                                <div style={{fontSize:10,color:"#555",fontWeight:700,padding:"4px 0 2px",letterSpacing:"0.4px"}}>
                                  YA PREPARADOS
                                </div>
                                {itemsOriginales.filter(it=>it.entregado).map((item,i) => renderItem(item, i, false))}
                              </>
                            )}
                          </>
                        );
                      }

                      // Sin items nuevos: mostrar todo normal
                      return itemsOriginales.map((item,i) => renderItem(item, i, false));
                    })()}
                  </div>

                  {/* Botones de acción — cobrados no tienen ninguno */}
                  {!esCobrado && (
                    <div style={S.cardAcc}>
                      {col.acc.map(a=>(
                        <button key={a.e} style={{...S.accBtn,background:a.c}}
                          onClick={()=>{
                            if (a.e==="cobrado") {
                              setModalCobro({ pedido: p, billete: "", cambio: null });
                            } else {
                              onUpdate(p.id, a.e);
                            }
                          }}>{a.l}</button>
                      ))}
                      {/* ➕ disponible en todas las etapas excepto cobrado */}
                      <button style={{...S.accBtn,background:"#9D4EDD"}}
                        onClick={()=>{ setPedidoSelec(p); setCarritoExtra([]); }}>➕</button>
                      {/* ✏️ Editar items del pedido */}
                      <button style={{...S.accBtn,background:"#3A86FF"}}
                        onClick={()=>setModalEditar({ pedido:p, items: JSON.parse(JSON.stringify(p.items||[])) })}>✏️</button>
                      {col.k==="pendiente" && (
                        <button style={{...S.accBtn,background:"#EF233C"}} onClick={()=>setPedidoCancelar(p)}>✕</button>
                      )}
                    </div>
                  )}
                  {esCobrado && (
                    <div style={{fontSize:11,color:"#1D6F42",textAlign:"center",marginTop:6,fontWeight:700}}>✅ Pedido cerrado</div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// PEDIDO
// ══════════════════════════════════════════════════════
function Pedido({ onAdd, menu, sesion }) {
  const [carrito,       setCarrito]       = useState([]);
  const [mesa,          setMesa]          = useState("");
  const [mesero,        setMesero]        = useState(sesion?.usuario || "");
  const [tipoServicio,  setTipoServicio]  = useState(""); // "sitio" | "llevar"
  const [productoModal, setProductoModal] = useState(null);
  const [filtro,        setFiltro]        = useState("comida");
  const [errores,       setErrores]       = useState({});
  const total = carrito.reduce((s,i)=>s+(i.subtotal||0),0);

  const confirmar = item => {
    if (productoModal?.editIdx !== undefined) {
      setCarrito(prev => prev.map((it,i) => i===productoModal.editIdx ? item : it));
    } else {
      setCarrito(prev => [...prev, item]);
    }
    setProductoModal(null);
  };

  const editarItem = (idx) => {
    const item = carrito[idx];
    const nombreBase = item.nombre.split(" (")[0].trim();
    const datosProducto = menu[nombreBase];
    if (!datosProducto) return;
    setProductoModal({ nombre: nombreBase, datos: datosProducto, editIdx: idx });
  };

  const enviar = () => {
    const errs = {};
    if (!mesa.trim())        errs.mesa       = "Escribe la mesa o nombre del cliente";
    if (!mesero.trim())      errs.mesero     = "Escribe el nombre del mesero";
    if (!tipoServicio)       errs.servicio   = "Selecciona si es para llevar o en sitio";
    if (Object.keys(errs).length) { setErrores(errs); setTimeout(()=>setErrores({}),3000); return; }
    onAdd({ items:carrito, mesa, mesero, tipoServicio, total });
    setCarrito([]); setMesa(""); setMesero(""); setTipoServicio("");
  };

  const inputStyle = campo => ({
    ...S.mesaInput,
    marginBottom: errores[campo] ? 4 : 14,
    ...(errores[campo] ? {border:"2px solid #EF233C"} : {})
  });

  return (
    <div style={{paddingBottom:130}}>
      {productoModal && (
        <ModalProducto
          nombre={productoModal.nombre}
          producto={productoModal.datos}
          onConfirmar={confirmar}
          onCerrar={()=>setProductoModal(null)}
        />
      )}

      {/* Mesa / Cliente */}
      <input style={inputStyle("mesa")}
        placeholder="🪑 Mesa / Nombre del cliente (obligatorio)"
        value={mesa} onChange={e=>setMesa(e.target.value)}/>
      {errores.mesa && <div style={S.errMsg}>{errores.mesa}</div>}

      {/* Mesero */}
      <input style={inputStyle("mesero")}
        placeholder="👤 Nombre del mesero (obligatorio)"
        value={mesero} onChange={e=>setMesero(e.target.value)}/>
      {errores.mesero && <div style={S.errMsg}>{errores.mesero}</div>}

      {/* Tipo de servicio */}
      <div style={{marginBottom:errores.servicio?4:16}}>
        <div style={{fontSize:13,color:"#aaa",marginBottom:8,fontWeight:600}}>📦 Tipo de servicio <span style={{color:"#EF233C"}}>*</span></div>
        <div style={{display:"flex",gap:10}}>
          {[{v:"sitio",l:"🍽️ En sitio"},{v:"llevar",l:"🥡 Para llevar"}].map(op=>(
            <button key={op.v}
              style={{flex:1,padding:"11px 0",borderRadius:12,border:`2px solid ${tipoServicio===op.v?"#E85D04":(errores.servicio?"#EF233C":"#333")}`,
                background:tipoServicio===op.v?"#E85D04":"#1A1A1A",
                color:tipoServicio===op.v?"#fff":"#aaa",fontWeight:700,fontSize:14,cursor:"pointer"}}
              onClick={()=>setTipoServicio(op.v)}>
              {op.l}
            </button>
          ))}
        </div>
      </div>
      {errores.servicio && <div style={S.errMsg}>{errores.servicio}</div>}

      {/* Filtro comida/bebida */}
      <div style={S.filtroRow}>
        <button style={{...S.filtroBtn,...(filtro==="comida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("comida")}>🍽️ Comida</button>
        <button style={{...S.filtroBtn,...(filtro==="bebida"?S.filtroBtnOn:{})}} onClick={()=>setFiltro("bebida")}>🥤 Bebidas</button>
      </div>

      <div style={S.menuGrid}>
        {Object.entries(menu).filter(([,d])=>d.categoria===filtro).map(([n,d])=>(
          <button key={n} style={{...S.mCard,borderTop:`4px solid ${d.color}`,cursor:"pointer"}}
            onClick={()=>setProductoModal({nombre:n,datos:d})}>
            <div style={{fontSize:28}}>{d.icon}</div>
            <div style={{fontWeight:700,fontSize:13,margin:"5px 0 3px"}}>{n}</div>
            <div style={{fontSize:11,color:"#aaa"}}>
              {d.precio?fmt(d.precio):d.precios?`desde ${fmt(Math.min(...Object.values(d.precios)))}`:""}{d.unidad?` ${d.unidad}`:""}
            </div>
          </button>
        ))}
      </div>

      {carrito.length > 0 && (
        <div style={S.carritoPanel}>
          <div style={{fontWeight:800,marginBottom:10,color:"#E85D04",fontSize:15}}>🛒 Carrito</div>
          {carrito.map((item,i)=>(
            <div key={i} style={{...S.carritoRow,flexWrap:"wrap",gap:4}}>
              <span style={{flex:1,fontSize:13,minWidth:0}}>
                {item.icon} {item.nombre}
                <span style={{color:"#E85D04",fontWeight:700,marginLeft:6}}>×{item.cantidad}</span>
              </span>
              <span style={{fontSize:13,color:"#E85D04",fontWeight:700,marginRight:6}}>{fmt(item.subtotal)}</span>
              {menu[item.nombre.split(" (")[0].trim()] && (
                <button style={{background:"#3A86FF",border:"none",color:"#fff",borderRadius:6,
                  padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",marginRight:4}}
                  onClick={()=>editarItem(i)}>✏️</button>
              )}
              <button style={S.removeBtn} onClick={()=>setCarrito(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
          <div style={{borderTop:"1px solid #333",marginTop:10,paddingTop:10,fontWeight:800,fontSize:17,textAlign:"right"}}>
            Total: {fmt(total)}
          </div>
          <button style={{...S.fab,...(!mesa.trim()||!mesero.trim()||!tipoServicio?{opacity:0.5}:{})}} onClick={enviar}>
            🚀 Enviar Pedido · {fmt(total)}
          </button>
        </div>
      )}
    </div>
  );
}

// REPORTES
// ══════════════════════════════════════════════════════
function Reportes({ pedidos }) {
  const hoy     = getTodayKey();
  const validos = pedidos.filter(p=>p.estado!=="cancelado");
  const hoyP    = validos.filter(p=>p.fecha===hoy);
  return (
    <div style={S.rWrap}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:16}}>
        <h3 style={{color:"#E85D04",margin:0}}>📊 Reportes</h3>
        <button style={{background:"#1D6F42",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer"}}
          onClick={()=>exportarExcel(pedidos)}>📥 Exportar Excel del día</button>
      </div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:20}}>
        {[
          {n:fmt(hoyP.reduce((s,p)=>s+(p.total||0),0)),    l:"Ventas hoy"},
          {n:fmt(validos.reduce((s,p)=>s+(p.total||0),0)), l:"Ventas totales"},
          {n:hoyP.length,                                   l:"Pedidos hoy"},
          {n:pedidos.filter(p=>p.estado==="cancelado"&&p.fecha===hoy).length, l:"Cancelados hoy"},
        ].map((s,i)=>(
          <div key={i} style={S.statCard}><div style={S.statNum}>{s.n}</div><div style={S.statLbl}>{s.l}</div></div>
        ))}
      </div>
      <h4 style={{color:"#ccc",margin:"0 0 10px"}}>Últimos 30 pedidos</h4>
      {pedidos.slice(0,30).map(p=>(
        <div key={p.id} style={{...S.card,marginBottom:6,fontSize:13}}>
          <b>#{p.idDia||String(p.ts||"").slice(-4)}</b> — {p.mesa||"Sin mesa"} — {p.mesero?`👤 ${p.mesero} · `:""}{p.tipoServicio==="llevar"?"🥡 ":"🍽️ "}{p.fecha} {p.hora} — {fmt(p.total)} —{" "}
          <span style={{color:p.estado==="cancelado"?"#EF233C":p.estado==="cobrado"?"#1D6F42":"#06D6A0"}}>{p.estado}</span>
        </div>
      ))}
    </div>
  );
}

// ADMIN — CRUD de menú + gestión de usuarios
// ══════════════════════════════════════════════════════
function AdminView({ menu, onUpdate }) {
  const [seccion,  setSeccion]  = useState("menu");   // "menu" | "usuarios"
  const [tab,      setTab]      = useState("lista");
  const [editando, setEditando] = useState(null);
  const [form,     setForm]     = useState(formVacio());
  // Usuarios: se guardan en Firebase bajo /usuarios
  const [usuarios,    setUsuarios]    = useState({});
  const [tabU,        setTabU]        = useState("lista"); // "lista"|"nuevo"
  const [editandoU,   setEditandoU]   = useState(null);
  const [formU,       setFormU]       = useState({usuario:"",pass:"",rol:"mesero"});
  const [notifAdmin,  setNotifAdmin]  = useState(null);

  useEffect(()=>{
    db.ref("usuarios").on("value", snap=>{
      const val = snap.val();
      // Merge Firebase users with hardcoded fallback
      setUsuarios(val || {});
    });
  },[]);

  const showNotifAdmin = msg => { setNotifAdmin(msg); setTimeout(()=>setNotifAdmin(null),2500); };

  const guardarUsuario = () => {
    const u = formU.usuario.trim().toLowerCase();
    if (!u)           { alert("El nombre de usuario es obligatorio"); return; }
    if (!formU.pass)  { alert("La contraseña es obligatoria"); return; }
    db.ref(`usuarios/${u}`).set({ pass:formU.pass, rol:formU.rol });
    showNotifAdmin(`✅ Usuario "${u}" ${editandoU?"actualizado":"creado"}`);
    setTabU("lista"); setEditandoU(null); setFormU({usuario:"",pass:"",rol:"mesero"});
  };

  const editarUsuario = (u, datos) => {
    setFormU({ usuario:u, pass:datos.pass, rol:datos.rol });
    setEditandoU(u); setTabU("nuevo");
  };

  const eliminarUsuario = (u) => {
    if (!confirm(`¿Eliminar al usuario "${u}"?`)) return;
    db.ref(`usuarios/${u}`).remove();
    showNotifAdmin(`🗑️ Usuario "${u}" eliminado`);
  };

  function formVacio() {
    return { nombre:"", icon:"🍽️", color:"#E85D04", categoria:"comida",
             precio:"", unidad:"", variantes:"", rellenos:"", sabores:"", extras:"", preciosRaw:"" };
  }

  const abrirNuevo  = () => { setForm(formVacio()); setEditando(null); setTab("nuevo"); };
  const abrirEditar = nombre => {
    const d = menu[nombre];
    setForm({
      nombre, icon:d.icon||"🍽️", color:d.color||"#E85D04", categoria:d.categoria||"comida",
      precio:d.precio||"", unidad:d.unidad||"",
      variantes:(d.variantes||[]).join(", "),
      rellenos:(d.rellenos||[]).join(", "),
      sabores:(d.sabores||[]).join(", "),
      extras:(d.extras||[]).join(", "),
      preciosRaw: d.precios ? JSON.stringify(d.precios,null,2) : "",
    });
    setEditando(nombre); setTab("nuevo");
  };

  const eliminar = nombre => {
    if (!confirm(`¿Eliminar "${nombre}" del menú?`)) return;
    const nuevo = {...menu}; delete nuevo[nombre]; onUpdate(nuevo);
  };

  const guardar = () => {
    const n = form.nombre.trim();
    if (!n) { alert("El nombre es obligatorio"); return; }
    const split = s => s.split(",").map(x=>x.trim()).filter(Boolean);
    let precios = null;
    if (form.preciosRaw.trim()) {
      try { precios = JSON.parse(form.preciosRaw); } catch { alert("Formato de precios inválido (JSON)"); return; }
    }
    const prod = {
      icon:form.icon||"🍽️", color:form.color||"#E85D04", categoria:form.categoria||"comida",
      ...(form.precio?{precio:Number(form.precio)}:{}),
      ...(form.unidad?{unidad:form.unidad}:{}),
      ...(split(form.variantes).length?{variantes:split(form.variantes)}:{}),
      ...(split(form.rellenos).length ?{rellenos:split(form.rellenos)}:{}),
      ...(split(form.sabores).length  ?{sabores:split(form.sabores)}:{}),
      ...(split(form.extras).length   ?{extras:split(form.extras)}:{}),
      ...(precios?{precios}:{}),
    };
    const nuevo = {...menu};
    if (editando && editando!==n) delete nuevo[editando];
    nuevo[n] = prod; onUpdate(nuevo); setTab("lista");
  };

  const inp = (campo, placeholder, tipo="text") => (
    <input type={tipo} style={SA.inp} placeholder={placeholder}
      value={form[campo]||""} onChange={e=>setForm(p=>({...p,[campo]:e.target.value}))}/>
  );

  return (
    <div style={S.rWrap}>
      {notifAdmin && <div style={{...S.toast,top:70}}>{notifAdmin}</div>}

      {/* Selector de sección */}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <button style={{...SA.tabBtn,...(seccion==="menu"?SA.tabBtnOn:{})}} onClick={()=>setSeccion("menu")}>🍽️ Menú</button>
        <button style={{...SA.tabBtn,...(seccion==="usuarios"?SA.tabBtnOn:{})}} onClick={()=>setSeccion("usuarios")}>👥 Usuarios</button>
      </div>

      {/* ── SECCIÓN MENÚ ── */}
      {seccion==="menu" && (
      <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{color:"#E85D04",margin:0}}>⚙️ Gestión de Menú</h3>
        {tab==="lista"
          ? <button style={SA.btnVerde} onClick={abrirNuevo}>+ Nuevo producto</button>
          : <button style={SA.btnGris}  onClick={()=>setTab("lista")}>← Volver</button>}
      </div>

      {tab==="lista" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
          {Object.entries(menu).map(([n,d])=>(
            <div key={n} style={{...S.card,borderTop:`4px solid ${d.color}`,padding:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:24}}>{d.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>{n}</div>
                  <div style={{fontSize:11,color:"#aaa"}}>{d.categoria} · {d.precio?fmt(d.precio):d.precios?`desde ${fmt(Math.min(...Object.values(d.precios)))}`:""}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button style={{...SA.btnPeq,background:"#3A86FF"}} onClick={()=>abrirEditar(n)}>✏️ Editar</button>
                <button style={{...SA.btnPeq,background:"#EF233C"}} onClick={()=>eliminar(n)}>🗑️ Eliminar</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="nuevo" && (
        <div style={{maxWidth:500}}>
          <h4 style={{color:"#ccc",marginTop:0}}>{editando?"Editando: "+editando:"Nuevo producto"}</h4>
          <div style={SA.grupo}><label style={SA.lbl}>Nombre *</label>{inp("nombre","Ej: Tlayuda")}</div>
          <div style={{display:"flex",gap:10}}>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Ícono</label>{inp("icon","🍽️")}</div>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Color</label>
              <input type="color" value={form.color||"#E85D04"} onChange={e=>setForm(p=>({...p,color:e.target.value}))}
                style={{width:"100%",height:42,borderRadius:8,border:"none",cursor:"pointer",background:"none"}}/>
            </div>
          </div>
          <div style={SA.grupo}>
            <label style={SA.lbl}>Categoría</label>
            <select style={SA.inp} value={form.categoria} onChange={e=>setForm(p=>({...p,categoria:e.target.value}))}>
              <option value="comida">Comida</option>
              <option value="bebida">Bebida</option>
            </select>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{...SA.grupo,flex:2}}><label style={SA.lbl}>Precio fijo ($)</label>{inp("precio","Ej: 55","number")}</div>
            <div style={{...SA.grupo,flex:1}}><label style={SA.lbl}>Unidad</label>{inp("unidad","c/u")}</div>
          </div>
          <div style={SA.grupo}><label style={SA.lbl}>Variantes <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("variantes","Ej: Verdes, Rojos")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Rellenos <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("rellenos","Ej: Pollo, Suadero")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Sabores <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("sabores","Ej: Chocolate, Fresa")}</div>
          <div style={SA.grupo}><label style={SA.lbl}>Extras <span style={{color:"#666",fontWeight:400}}>(separadas por coma)</span></label>{inp("extras","Ej: Crema, Cebolla, Extra Queso +$5")}</div>
          <div style={SA.grupo}>
            <label style={SA.lbl}>Precios por variante <span style={{color:"#666",fontWeight:400}}>(JSON, opcional)</span></label>
            <textarea style={{...SA.inp,height:90,resize:"vertical",fontFamily:"monospace",fontSize:12}}
              placeholder={'{"Corona 1/2 L": 45, "Corona 1 L": 90}'}
              value={form.preciosRaw||""} onChange={e=>setForm(p=>({...p,preciosRaw:e.target.value}))}/>
          </div>
          <button style={{...SA.btnVerde,width:"100%",padding:"13px 0",fontSize:15,marginTop:4}} onClick={guardar}>
            💾 {editando?"Guardar cambios":"Crear producto"}
          </button>
        </div>
      )}
    </div>
      )}

      {/* ── SECCIÓN USUARIOS ── */}
      {seccion==="usuarios" && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{color:"#E85D04",margin:0}}>👥 Gestión de Usuarios</h3>
            {tabU==="lista"
              ? <button style={SA.btnVerde} onClick={()=>{ setFormU({usuario:"",pass:"",rol:"mesero"}); setEditandoU(null); setTabU("nuevo"); }}>+ Nuevo usuario</button>
              : <button style={SA.btnGris}  onClick={()=>setTabU("lista")}>← Volver</button>}
          </div>

          {tabU==="lista" && (
            <div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:480}}>
              {/* Usuarios hardcoded siempre visibles */}
              {[{u:"admin",d:{rol:"admin"}},{u:"mesero1",d:{rol:"mesero"}},{u:"mesero2",d:{rol:"mesero"}},{u:"mesero3",d:{rol:"mesero"}},{u:"tablero",d:{rol:"tablero"}}].map(({u,d})=>(
                <div key={u} style={{...S.card,display:"flex",alignItems:"center",gap:12,padding:14}}>
                  <div style={{fontSize:28}}>👤</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15}}>{u}</div>
                    <div style={{fontSize:12,color:"#aaa"}}>{d.rol} · contraseña fija</div>
                  </div>
                  <span style={{fontSize:11,color:"#555",background:"#333",padding:"2px 8px",borderRadius:10}}>sistema</span>
                </div>
              ))}
              {/* Usuarios de Firebase */}
              {Object.entries(usuarios).map(([u,d])=>(
                <div key={u} style={{...S.card,display:"flex",alignItems:"center",gap:12,padding:14}}>
                  <div style={{fontSize:28}}>👤</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:15}}>{u}</div>
                    <div style={{fontSize:12,color:"#aaa"}}>{d.rol}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button style={{...SA.btnPeq,background:"#3A86FF",padding:"5px 10px"}} onClick={()=>editarUsuario(u,d)}>✏️</button>
                    <button style={{...SA.btnPeq,background:"#EF233C",padding:"5px 10px"}} onClick={()=>eliminarUsuario(u)}>🗑️</button>
                  </div>
                </div>
              ))}
              {Object.keys(usuarios).length===0 && (
                <div style={{color:"#555",fontSize:14,padding:10}}>No hay usuarios adicionales creados aún.</div>
              )}
            </div>
          )}

          {tabU==="nuevo" && (
            <div style={{maxWidth:400}}>
              <h4 style={{color:"#ccc",marginTop:0}}>{editandoU?`Editando: ${editandoU}`:"Nuevo usuario"}</h4>
              <div style={SA.grupo}>
                <label style={SA.lbl}>Usuario *</label>
                <input style={SA.inp} placeholder="Ej: juan" value={formU.usuario}
                  disabled={!!editandoU}
                  onChange={e=>setFormU(p=>({...p,usuario:e.target.value.toLowerCase()}))}/>
              </div>
              <div style={SA.grupo}>
                <label style={SA.lbl}>Contraseña *</label>
                <input style={SA.inp} placeholder="Contraseña" value={formU.pass}
                  onChange={e=>setFormU(p=>({...p,pass:e.target.value}))}/>
              </div>
              <div style={SA.grupo}>
                <label style={SA.lbl}>Rol</label>
                <select style={SA.inp} value={formU.rol} onChange={e=>setFormU(p=>({...p,rol:e.target.value}))}>
                  <option value="mesero">Mesero</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button style={{...SA.btnVerde,width:"100%",padding:"13px 0",fontSize:15}} onClick={guardarUsuario}>
                💾 {editandoU?"Guardar cambios":"Crear usuario"}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const SA = {
  tabBtn:{ flex:1,padding:"10px 0",borderRadius:10,border:"1px solid #333",background:"#1A1A1A",color:"#888",fontWeight:700,fontSize:14,cursor:"pointer" },
  tabBtnOn:{ background:"#E85D04",border:"1px solid #E85D04",color:"#fff" },
  grupo:{ marginBottom:12 },
  lbl:{ display:"block",fontSize:12,color:"#888",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px" },
  inp:{ width:"100%",background:"#111",border:"1px solid #333",color:"#fff",borderRadius:8,padding:"10px 12px",fontSize:14 },
  btnVerde:{ background:"#1D6F42",color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer" },
  btnGris:{ background:"#333",color:"#ccc",border:"none",borderRadius:10,padding:"9px 16px",fontWeight:700,fontSize:13,cursor:"pointer" },
  btnPeq:{ flex:1,border:"none",borderRadius:6,padding:"5px 0",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer" },
};

// ══════════════════════════════════════════════════════
// ESTILOS
// ══════════════════════════════════════════════════════

</script>
